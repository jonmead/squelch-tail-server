<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 130" width="480" height="130">
  <defs>
    <!-- Active signal gradient: full amber -->
    <linearGradient id="activeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>

    <!-- Tail gradient: amber fading to transparent -->
    <linearGradient id="tailGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#f59e0b" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.08"/>
    </linearGradient>

    <!-- Glow filter for active bars -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="480" height="130" rx="12" fill="#0f172a"/>

  <!-- ── Waveform ─────────────────────────────────────────────────────────── -->
  <!-- Centre line Y = 72. Each bar is drawn as two rects (above + below). -->
  <!-- Bar width=6, gap=3, so pitch=9. Starting x=20. -->

  <!-- Active signal bars (strong, full amber with glow) -->
  <!-- Heights (half-amplitude): 28 36 42 52 58 48 44 56 50 38 30 -->
  <g fill="url(#activeGrad)" filter="url(#glow)">
    <rect x="20"  y="44" width="6" height="28" rx="2"/>  <rect x="20"  y="72" width="6" height="28" rx="2"/>
    <rect x="29"  y="36" width="6" height="36" rx="2"/>  <rect x="29"  y="72" width="6" height="36" rx="2"/>
    <rect x="38"  y="30" width="6" height="42" rx="2"/>  <rect x="38"  y="72" width="6" height="42" rx="2"/>
    <rect x="47"  y="20" width="6" height="52" rx="2"/>  <rect x="47"  y="72" width="6" height="52" rx="2"/>
    <rect x="56"  y="14" width="6" height="58" rx="2"/>  <rect x="56"  y="72" width="6" height="58" rx="2"/>
    <rect x="65"  y="24" width="6" height="48" rx="2"/>  <rect x="65"  y="72" width="6" height="48" rx="2"/>
    <rect x="74"  y="28" width="6" height="44" rx="2"/>  <rect x="74"  y="72" width="6" height="44" rx="2"/>
    <rect x="83"  y="16" width="6" height="56" rx="2"/>  <rect x="83"  y="72" width="6" height="56" rx="2"/>
    <rect x="92"  y="22" width="6" height="50" rx="2"/>  <rect x="92"  y="72" width="6" height="50" rx="2"/>
    <rect x="101" y="34" width="6" height="38" rx="2"/>  <rect x="101" y="72" width="6" height="38" rx="2"/>
    <rect x="110" y="42" width="6" height="30" rx="2"/>  <rect x="110" y="72" width="6" height="30" rx="2"/>
  </g>

  <!-- Squelch tail bars (irregular noise, fading out, no glow) -->
  <!-- Heights decrease irregularly: 18 10 14 7 11 5 8 3 6 2 4 1 3 -->
  <g fill="url(#tailGrad)">
    <rect x="122" y="54" width="6" height="18" rx="2"/>  <rect x="122" y="72" width="6" height="18" rx="2"/>
    <rect x="131" y="62" width="6" height="10" rx="2"/>  <rect x="131" y="72" width="6" height="10" rx="2"/>
    <rect x="140" y="58" width="6" height="14" rx="2"/>  <rect x="140" y="72" width="6" height="14" rx="2"/>
    <rect x="149" y="65" width="6" height="7"  rx="2"/>  <rect x="149" y="72" width="6" height="7"  rx="2"/>
    <rect x="158" y="61" width="6" height="11" rx="2"/>  <rect x="158" y="72" width="6" height="11" rx="2"/>
    <rect x="167" y="67" width="6" height="5"  rx="2"/>  <rect x="167" y="72" width="6" height="5"  rx="2"/>
    <rect x="176" y="64" width="6" height="8"  rx="2"/>  <rect x="176" y="72" width="6" height="8"  rx="2"/>
    <rect x="185" y="69" width="6" height="3"  rx="2"/>  <rect x="185" y="72" width="6" height="3"  rx="2"/>
    <rect x="194" y="66" width="6" height="6"  rx="2"/>  <rect x="194" y="72" width="6" height="6"  rx="2"/>
    <rect x="203" y="70" width="6" height="2"  rx="2"/>  <rect x="203" y="72" width="6" height="2"  rx="2"/>
    <rect x="212" y="68" width="6" height="4"  rx="2"/>  <rect x="212" y="72" width="6" height="4"  rx="2"/>
    <rect x="221" y="71" width="6" height="1"  rx="1"/>  <rect x="221" y="72" width="6" height="1"  rx="1"/>
    <rect x="230" y="70" width="6" height="2"  rx="1"/>  <rect x="230" y="72" width="6" height="2"  rx="1"/>
  </g>

  <!-- ── Wordmark ─────────────────────────────────────────────────────────── -->
  <text
    x="252" y="62"
    font-family="'SF Mono', 'Fira Code', 'Consolas', monospace"
    font-size="32"
    font-weight="700"
    letter-spacing="-0.5"
    fill="#f8fafc">SQUELCH</text>

  <text
    x="252" y="98"
    font-family="'SF Mono', 'Fira Code', 'Consolas', monospace"
    font-size="32"
    font-weight="700"
    letter-spacing="-0.5"
    fill="#f59e0b">TAIL</text>


</svg>
