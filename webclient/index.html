/* ── Reset ───────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    /* Departure board palette */
    --bg:      #0a0904;   /* dark warm black */
    --bg2:     #141209;
    --bg3:     #1e1c12;
    --bg4:     #2a2718;
    --amb:     #f5b030;   /* primary amber  — bright LED */
    --amb2:    #d89020;   /* secondary      */
    --amb3:    #b07830;   /* dim / metadata */
    --amb4:    #7a5520;   /* borders / inactive */
    --amb5:    #3e2e0e;   /* very dim separator */
    --white:   #f5f0e0;   /* bright highlight for channel name */
    --green:   #22c55e;
    --green2:  #0d4020;
    --red:     #ef4444;
    --border:  #2a2510;

    /* LCD/player sub-palette */
    --lcd-bg:  #060503;
    --lcd-hi:  #f0d840;
    --lcd-mid: #b89a18;
    --lcd-dim: #4a3c08;

    /* Typography */
    --font-board: 'Share Tech Mono', 'Fira Code', 'Consolas', monospace;
    --font-lcd:   'VT323', 'Share Tech Mono', monospace;
    --font-sub:   'SubwayTicker', 'VT323', 'Share Tech Mono', monospace;
}

html, body {
    height: 100%;
    background: var(--bg);
    color: var(--amb);
    font-family: var(--font-board);
    font-size: 13px;
    line-height: 1.4;
    overflow: hidden;
    text-rendering: optimizeLegibility;
}

/* ── Layout ──────────────────────────────────────────────────────────────── */
#app {
    display: grid;
    grid-template-rows: auto 1fr;
    grid-template-columns: 240px 1fr;
    height: 100vh;
}
#header {
    grid-column: 1 / -1;
    background: var(--bg2);
    border-bottom: 1px solid var(--amb5);
    padding: 7px 14px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    position: relative;
}
#sidebar {
    background: var(--bg2);
    border-right: 1px solid var(--amb5);
    display: flex;
    flex-direction: column;
    overflow: hidden;
}
#main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* ── Header ──────────────────────────────────────────────────────────────── */

/* LIVE indicator */
#live-badge {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; letter-spacing: 0.18em;
    color: var(--amb4); text-transform: uppercase;
    cursor: pointer; user-select: none;
}
#live-badge.connected { color: var(--green); }
#live-badge.standby   { color: var(--amb2); }
.live-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
#live-badge.connected .live-dot { animation: livepulse 2s ease-in-out infinite; }
#live-badge.standby   .live-dot { animation: none; }
@keyframes livepulse { 0%,100%{opacity:1} 50%{opacity:.15} }

/* Buttons */
.hdr-btn {
    padding: 3px 10px;
    background: transparent;
    border: 1px solid var(--amb4);
    color: var(--amb3);
    cursor: pointer;
    font-family: var(--font-board);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: all 0.1s;
    white-space: nowrap;
}
.hdr-btn.active { background: var(--amb); color: var(--bg); border-color: var(--amb); font-weight: bold; }
.hdr-btn:hover:not(.active) { border-color: var(--amb2); color: var(--amb2); }

#volume-wrap { display: flex; align-items: center; gap: 8px; margin-left: auto; }
#volume-wrap label { font-size: 10px; letter-spacing: 0.18em; color: var(--amb3); text-transform: uppercase; }
#volume { accent-color: var(--amb); width: 72px; cursor: pointer; }

#server-btn {
    padding: 3px 7px; background: transparent;
    border: 1px solid var(--amb4); color: var(--amb3);
    cursor: pointer; font-size: 14px; line-height: 1; transition: all .1s;
}
#server-btn:hover, #server-btn.open { border-color: var(--amb); color: var(--amb); }

#server-url-display {
    color: var(--amb4); font-size: 10px; letter-spacing: 0.06em;
    max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

/* ── Server panel ────────────────────────────────────────────────────────── */
#server-panel {
    display: none; position: absolute; top: calc(100% + 4px); right: 0;
    background: var(--bg2); border: 1px solid var(--amb);
    padding: 12px 14px; z-index: 100; min-width: 240px;
    box-shadow: 0 8px 32px rgba(0,0,0,.8);
}
#server-panel.open { display: block; }
#server-panel label {
    display: block; color: var(--amb3); font-size: 10px;
    text-transform: uppercase; letter-spacing: .14em; margin-bottom: 4px; margin-top: 10px;
}
#server-panel label:first-of-type { margin-top: 0; }
.srv-input {
    width: 100%; background: var(--bg3); border: 1px solid var(--amb4);
    color: var(--amb); font-family: var(--font-board); font-size: 12px; padding: 5px 8px;
}
.srv-input:focus { outline: none; border-color: var(--amb); }
#server-panel-actions { display: flex; gap: 6px; margin-top: 12px; }
.srv-btn {
    flex: 1; padding: 5px 0; border: 1px solid var(--amb4);
    background: transparent; color: var(--amb3); cursor: pointer;
    font-family: var(--font-board); font-size: 11px;
    text-transform: uppercase; letter-spacing: .1em; transition: all .1s;
}
.srv-btn.primary { background: var(--amb); border-color: var(--amb); color: var(--bg); font-weight: bold; }
.srv-btn.primary:hover { background: var(--amb2); border-color: var(--amb2); }
.srv-btn:not(.primary):hover { border-color: var(--amb2); color: var(--amb2); }

/* ── Sidebar ─────────────────────────────────────────────────────────────── */
#sidebar-header {
    padding: 7px 10px 5px;
    color: var(--amb3);
    font-size: 10px; letter-spacing: .18em; text-transform: uppercase;
    border-bottom: 1px solid var(--amb5);
    display: flex; justify-content: space-between; align-items: center;
}
#toggle-all-btn {
    font-size: 10px; padding: 2px 7px; background: transparent;
    border: 1px solid var(--amb4); color: var(--amb3);
    cursor: pointer; font-family: var(--font-board);
    letter-spacing: .08em; text-transform: uppercase;
}
#toggle-all-btn:hover { border-color: var(--amb); color: var(--amb); }
#systems-list { flex: 1; overflow-y: auto; padding: 2px 0; }

.sys-item { padding: 4px 10px; cursor: pointer; user-select: none; }
.sys-item:hover { background: rgba(232,149,10,.05); }
.sys-header { display: flex; align-items: center; gap: 7px; color: var(--amb2); font-size: 12px; letter-spacing: .04em; }
.sys-toggle {
    width: 12px; height: 12px; border: 1px solid var(--amb4);
    background: transparent; cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 9px; transition: all .1s;
}
.sys-toggle.on      { background: var(--amb); border-color: var(--amb); color: var(--bg); }
.sys-toggle.partial { background: var(--amb3); border-color: var(--amb2); color: var(--amb); }
.sys-chevron { color: var(--amb4); transition: transform .2s; flex-shrink: 0; margin-left: auto; font-size: 10px; }
.sys-chevron.open { transform: rotate(90deg); }
.tg-list { padding: 2px 0 2px 18px; display: none; }
.tg-list.open { display: block; }
.tg-item { display: flex; align-items: center; gap: 5px; padding: 2px 3px; cursor: pointer; }
.tg-item:hover { background: rgba(232,149,10,.05); }
.tg-check {
    width: 10px; height: 10px; border: 1px solid var(--amb4); background: transparent;
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    font-size: 8px; transition: all .1s;
}
.tg-check.on { background: var(--amb); border-color: var(--amb); color: var(--bg); }
.tg-label { color: var(--amb3); font-size: 11px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tg-id    { color: var(--amb4); font-size: 10px; }

/* ── Filter bar ──────────────────────────────────────────────────────────── */
#filter-bar {
    padding: 5px 8px;
    border-bottom: 1px solid var(--amb5);
    background: var(--bg2);
    display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
}
.fl-label { color: var(--amb3); font-size: 10px; letter-spacing: .14em; text-transform: uppercase; }
.fl-input {
    background: var(--bg3); border: 1px solid var(--amb5); border-bottom-color: var(--amb4);
    color: var(--amb); font-family: var(--font-board); font-size: 11px;
    padding: 2px 6px; width: 78px;
}
.fl-input[type="date"] { width: 110px; color-scheme: dark; }
.fl-input:focus { outline: none; border-color: var(--amb2); }
.fl-input.active { border-color: var(--amb); color: var(--white); }
#filter-clear-btn {
    padding: 2px 8px; background: transparent; border: 1px solid var(--amb4);
    color: var(--amb3); cursor: pointer; font-family: var(--font-board);
    font-size: 10px; text-transform: uppercase; letter-spacing: .1em; margin-left: auto;
}
#filter-clear-btn:hover { border-color: var(--amb2); color: var(--amb2); }

/* ── Board column headers ────────────────────────────────────────────────── */
#board-header {
    display: grid;
    grid-template-columns: 66px 48px 1fr 110px 40px 54px;
    padding: 4px 8px 3px;
    border-bottom: 1px solid var(--amb);
    background: var(--bg2);
    font-size: 9px; letter-spacing: .2em; text-transform: uppercase;
    color: var(--amb3);
    flex-shrink: 0;
}
#board-header span:not(:first-child) { padding-left: 4px; }

/* ── Call list (departure board rows) ───────────────────────────────────── */
#call-list {
    flex: 1;
    overflow-y: auto;
}

/* Each call is a two-row departure entry */
.dep-row {
    display: grid;
    grid-template-columns: 66px 48px 1fr 110px 40px 54px;
    padding: 4px 8px 0;
    cursor: pointer;
    transition: background .1s;
    border-bottom: 1px solid var(--amb5);
}
.dep-row:hover     { background: rgba(232,149,10,.04); }
.dep-row.active    { background: rgba(232,149,10,.07); }
.dep-row.emergency { border-left: 2px solid var(--red); }

.dep-detail {
    grid-column: 3 / -1;
    padding: 1px 0 4px 4px;
    font-size: 10px; color: var(--amb4);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    display: flex; gap: 8px; align-items: center;
}
.dep-units {
    grid-column: 3 / -1;
    padding: 0 0 4px 4px;
    display: flex; gap: 4px; flex-wrap: wrap;
}

/* Column cells */
.dc-time    { font-size: 11px; color: var(--amb3); white-space: nowrap; padding-right: 4px; letter-spacing: .04em; }
.dc-id      { font-size: 11px; color: var(--amb2); white-space: nowrap; padding-left: 4px; }
.dc-channel { font-size: 12px; color: var(--amb); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-left: 4px; letter-spacing: .03em; }
.dc-sys     { font-size: 10px; color: var(--amb3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-left: 4px; }
.dc-dur     { font-size: 10px; color: var(--amb3); text-align: right; white-space: nowrap; }
.dc-type    { font-size: 9px; text-align: right; white-space: nowrap; letter-spacing: .06em; color: var(--amb3); padding-left: 4px; }

.dep-row.active .dc-channel { color: var(--white); }
.dep-row.active .dc-id      { color: var(--amb);   }

/* Secondary detail elements */
.dd-freq  { color: var(--amb3); }
.dd-group { color: var(--amb4); }
.dd-snr   { font-size: 9px; padding: 0 4px; border: 1px solid var(--amb5); }
.dd-snr.snr-good { color: var(--green);  border-color: rgba(34,197,94,.3); }
.dd-snr.snr-fair { color: var(--amb2);   border-color: var(--amb4); }
.dd-snr.snr-poor { color: var(--red);    border-color: rgba(239,68,68,.3); }
.dd-patch { color: var(--amb4); font-style: italic; }
.dd-emerg { color: var(--red); letter-spacing: .1em; font-size: 9px; }

.unit-chip {
    font-size: 9px; color: var(--amb4);
    border: 1px solid var(--amb5); padding: 0 4px;
}

/* Type strings */
.type-ana { color: var(--amb2); }
.type-dig { color: #3b82f6; }

/* ── Load more ───────────────────────────────────────────────────────────── */
#load-more-wrap {
    padding: 5px 8px; display: none; justify-content: space-between;
    align-items: center; border-top: 1px solid var(--amb5);
    background: var(--bg2);
}
#load-more-wrap.visible { display: flex; }
#load-more-btn {
    padding: 3px 16px; background: transparent; border: 1px solid var(--amb4);
    color: var(--amb3); cursor: pointer; font-family: var(--font-board);
    font-size: 10px; text-transform: uppercase; letter-spacing: .12em;
}
#load-more-btn:hover { border-color: var(--amb); color: var(--amb); }
#load-more-info { font-size: 10px; color: var(--amb4); letter-spacing: .06em; }

/* ── Departure board player ──────────────────────────────────────────────── */
#player-bar {
    background: var(--bg2);
    border-top: 1px solid var(--amb4);
    padding: 0;
    flex-shrink: 0;
}

#board-display {
    background: var(--lcd-bg);
    background-image: radial-gradient(circle, rgba(232,149,10,.025) 1px, transparent 1px);
    background-size: 3px 3px;
    border-top: 2px solid var(--amb5);
    padding: 7px 10px 6px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    position: relative;
    overflow: hidden;
    min-height: 160px;
}
#board-display::after {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,.06) 2px, rgba(0,0,0,.06) 3px
    );
    pointer-events: none;
}

/* ── LED / LCD character cells ────────────────────────────────────────────── */
.lc {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 0.63em;
    min-height: 1.1em;
    background: #1a1500;
    border: 1px solid #2a2200;
    margin: 0 4px;
    font-family: var(--font-sub);
    color: inherit;
    line-height: 1;
    flex-shrink: 0;
    box-sizing: border-box;
}
/* Dim/standby: show a faint character on the lit cell background */
.lc.dim { color: #4a3c08; }

/* Row 1: RX indicator + channel (LED) + badges
   Left-border accent + bottom rule creates the "offset" primary display feel */
#bd-r1 {
    display: flex; align-items: center; gap: 8px; min-height: 42px;
    padding-bottom: 5px;
    border-bottom: 1px solid var(--lcd-dim);
    margin-bottom: 3px;
    transition: border-color .2s;
}
#player-bar.playing #bd-r1 { border-color: var(--lcd-mid); }
#rx-ind {
    display: flex; align-items: center; gap: 4px;
    font-size: 10px; letter-spacing: .18em; text-transform: uppercase;
    color: var(--lcd-dim); white-space: nowrap; flex-shrink: 0; transition: color .2s;
}
.rx-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--lcd-dim); flex-shrink: 0; transition: all .2s;
}
#player-bar.playing #rx-ind { color: var(--lcd-hi); }
#player-bar.playing .rx-dot {
    background: var(--lcd-hi);
    box-shadow: 0 0 6px var(--lcd-mid);
    animation: rxblink .85s ease-in-out infinite;
}
@keyframes rxblink { 0%,100%{opacity:1} 50%{opacity:.1} }

/* Channel: LED cells, SubwayTicker font, large */
#bd-channel {
    font-family: var(--font-sub);
    font-size: 36px;
    line-height: 1;
    color: var(--lcd-dim);
    overflow: hidden;
    white-space: nowrap;
    flex: 1;
    transition: color .2s;
    display: flex;
    align-items: center;
}
#player-bar.playing #bd-channel { color: var(--lcd-hi); text-shadow: 0 0 10px rgba(240,216,64,.35); }

/* Flip-in animation when channel changes */
@keyframes flipin {
    0%   { transform: perspective(600px) rotateX(-80deg); opacity: 0; }
    100% { transform: perspective(600px) rotateX(0); opacity: 1; }
}
.flip { animation: flipin .25s ease-out; }

#bd-badges { display: flex; gap: 4px; align-items: center; flex-shrink: 0; }
.bd-badge {
    font-family: var(--font-board); font-size: 8px; font-weight: bold;
    letter-spacing: .1em; padding: 1px 4px; border: 1px solid; flex-shrink: 0;
    text-transform: uppercase;
}
.bdb-ana   { color: #7a4d05; border-color: #3d2503; }
.bdb-dig   { color: #1e3a5f; border-color: #172a4a; }
.bdb-p25   { color: #1e3a5f; border-color: #172a4a; }
.bdb-emerg { color: var(--red); border-color: var(--red); animation: emergblink 1s ease-in-out infinite; }
@keyframes emergblink { 0%,100%{opacity:1} 50%{opacity:.2} }
#player-bar.playing .bdb-ana  { color: #fcd34d; border-color: #d97706; }
#player-bar.playing .bdb-dig  { color: #93c5fd; border-color: #3b82f6; }
#player-bar.playing .bdb-p25  { color: #93c5fd; border-color: #3b82f6; }

/* Row 2: system/group text */
#bd-r2 {
    font-family: var(--font-board); font-size: 10px;
    color: var(--lcd-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    letter-spacing: .04em; min-height: 13px; transition: color .2s;
}
#player-bar.playing #bd-r2 { color: #6a5a10; }

/* Row 2b: Freq / Slot / CC — field columns: label above, LED value below */
#bd-r2b {
    display: flex;
    align-items: flex-start;
    gap: 24px;
    padding: 4px 0 2px;
    font-size: 18px;
    color: var(--lcd-dim);
    flex-wrap: wrap;
}
#player-bar.playing #bd-r2b { color: var(--lcd-hi); }
/* Each field stacks its label + value vertically */
.led-field { display: flex; flex-direction: column; gap: 3px; }
/* Labels: variable/proportional font — visually distinct from the fixed LED values */
.led-field-label {
    font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
    font-size: 9px; font-weight: 600;
    letter-spacing: .16em; color: var(--lcd-dim);
    text-transform: uppercase; flex-shrink: 0;
}
#player-bar.playing .led-field-label { color: var(--lcd-mid); }
.led-seg { display: flex; align-items: center; gap: 0; }

/* Row 3: Signal info */
#bd-r3 {
    display: none; align-items: center; gap: 10px;
    font-size: 9px; color: var(--lcd-dim); min-height: 11px;
}
#bd-r3.has-signal { display: flex; }
/* Label uses same variable/proportional font as field labels */
.bd-sig-lbl {
    font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
    font-size: 9px; font-weight: 600;
    letter-spacing: .16em; text-transform: uppercase;
    color: var(--lcd-dim); flex-shrink: 0;
}
#player-bar.playing .bd-sig-lbl { color: var(--lcd-mid); }
#bd-snr-track { max-width: 50px; height: 2px; background: var(--lcd-dim); flex-shrink: 0; }
#bd-snr-fill  { height: 100%; width: 0%; transition: width .5s ease, background .5s ease; }
#bd-snr-text  {
    font-family: var(--font-board); font-size: 9px; letter-spacing: .04em;
    color: var(--lcd-dim); white-space: nowrap; transition: color .2s;
}
#player-bar.playing #bd-snr-text { color: var(--lcd-mid); }

/* Row 4: progress + tick marks */
#bd-prog-wrap { position: relative; padding-bottom: 5px; }
#bd-ticks     { position: absolute; top: 0; left: 0; right: 0; height: 5px; pointer-events: none; }
.unit-tick {
    position: absolute; top: 0; width: 1px; height: 5px;
    background: var(--lcd-dim); transform: translateX(-50%); transition: all .12s;
}
.unit-tick.active { background: var(--lcd-hi); width: 2px; box-shadow: 0 0 3px var(--lcd-hi); }
#bd-prog { height: 2px; background: var(--lcd-dim); overflow: hidden; }
#bd-prog-bar {
    height: 100%; width: 0%; background: var(--lcd-hi);
    transition: width .2s linear; box-shadow: 0 0 3px var(--lcd-mid);
}

/* Row 5: play/pause + time + active unit */
#bd-r5 { display: flex; align-items: center; gap: 10px; min-height: 22px; }
#bd-playpause {
    background: transparent;
    border: 1px solid var(--lcd-dim);
    color: var(--lcd-dim);
    font-size: 13px;
    width: 26px; height: 22px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all .1s;
    padding: 0; line-height: 1;
}
#bd-playpause:disabled { opacity: .3; cursor: default; }
#bd-playpause:not(:disabled):hover { border-color: var(--lcd-mid); color: var(--lcd-mid); }
#player-bar.playing #bd-playpause { border-color: var(--lcd-hi); color: var(--lcd-hi); }
#player-bar.paused  #bd-playpause { border-color: var(--amb2);  color: var(--amb2);  }
#bd-time {
    font-family: var(--font-board); font-size: 9px; letter-spacing: .1em;
    color: var(--lcd-dim); white-space: nowrap; flex-shrink: 0; min-width: 88px;
    transition: color .2s;
}
#player-bar.playing #bd-time { color: var(--lcd-mid); }
#bd-active {
    font-family: var(--font-sub); font-size: 18px;
    color: var(--lcd-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    flex: 1; letter-spacing: .04em; transition: color .12s;
}
#bd-active.on-air { color: var(--lcd-hi); }
#bd-active.on-air::before { content: '▶ '; font-size: 13px; opacity: .7; }

/* Row 6: unit chips */
#bd-units { display: flex; gap: 4px; flex-wrap: wrap; min-height: 13px; }
.bd-chip {
    font-family: var(--font-board); font-size: 9px; color: var(--lcd-dim);
    border: 1px solid var(--lcd-dim); padding: 0 5px; letter-spacing: .04em;
    transition: all .12s; cursor: default;
}
.bd-chip.active {
    color: var(--lcd-hi); border-color: var(--lcd-mid);
    background: rgba(240,216,64,.06); box-shadow: 0 0 4px rgba(240,216,64,.18);
}

audio { display: none; }

/* ── Empty state ─────────────────────────────────────────────────────────── */
.empty-state {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 100%; color: var(--amb4); gap: 10px;
}
.empty-state .icon { font-size: 28px; opacity: .3; }
.empty-state p { font-size: 11px; letter-spacing: .14em; text-transform: uppercase; }

/* ── Scrollbars ──────────────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--amb5); }
::-webkit-scrollbar-thumb:hover { background: var(--amb4); }
</style>
</head>

<div id="app">

  <!-- ── Header ─────────────────────────────────────────────────────────── -->

    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 130" width="192" height="52">
      <defs>

        <rect x="158" y="61" width="6" height="11" rx="2"/><rect x="158" y="72" width="6" height="11" rx="2"/>
        <rect x="167" y="67" width="6" height="5"  rx="2"/><rect x="167" y="72" width="6" height="5"  rx="2"/>
        <rect x="176" y="64" width="6" height="8"  rx="2"/><rect x="176" y="72" width="6" height="8"  rx="2"/>
        <rect x="185" y="69" width="6" height="3"  rx="2"/><rect x="185" y="72" width="6" height="3"  rx="2"/>
        <rect x="194" y="66" width="6" height="6"  rx="2"/><rect x="194" y="72" width="6" height="6"  rx="2"/>
        <rect x="203" y="70" width="6" height="2"  rx="2"/><rect x="203" y="72" width="6" height="2"  rx="2"/>
        <rect x="212" y="68" width="6" height="4"  rx="2"/><rect x="212" y="72" width="6" height="4"  rx="2"/>
        <rect x="221" y="71" width="6" height="1"  rx="1"/><rect x="221" y="72" width="6" height="1"  rx="1"/>
        <rect x="230" y="70" width="6" height="2"  rx="1"/><rect x="230" y="72" width="6" height="2"  rx="1"/>
      </g>
      <text x="252" y="62"  font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="32" font-weight="700" letter-spacing="-0.5" fill="#f8fafc">SQUELCH</text>
      <text x="252" y="98" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="32" font-weight="700" letter-spacing="-0.5" fill="#f59e0b">TAIL</text>
    </svg>

    <div id="live-badge" onclick="toggleLiveMode()" title="Toggle live playback">
      <div class="live-dot"></div><span id="live-label">LIVE</span>
    </div>

    <button class="hdr-btn" id="btn-analog" onclick="toggleAnalog()"
            title="Analog Enhancements: MDC/CTCSS tail muting — analog only">
      Analog Enh
    </button>

    <span id="server-url-display"></span>

    <div id="volume-wrap">
      <label for="volume">Vol</label>
      <input type="range" id="volume" min="0" max="1" step="0.05" value="1">
    </div>

    <button id="server-btn" title="Server settings" onclick="toggleServerPanel()">⚙</button>

    <div id="server-panel">
      <label for="sp-host">Host</label>
      <input class="srv-input" id="sp-host" type="text" placeholder="localhost" spellcheck="false" autocomplete="off">
      <label for="sp-port">Port</label>
      <input class="srv-input" id="sp-port" type="number" placeholder="51515" min="1" max="65535">
      <div id="server-panel-actions">
        <button class="srv-btn" onclick="closeServerPanel()">Cancel</button>
        <button class="srv-btn primary" onclick="applyServer()">Connect</button>
      </div>
    </div>
  </header>

  <!-- ── Sidebar ────────────────────────────────────────────────────────── -->
  <aside id="sidebar">
    <div id="sidebar-header">
      <span>Systems</span>
      <button id="toggle-all-btn" onclick="toggleAllSystems()">All</button>
    </div>
    <div id="systems-list"></div>
  </aside>

  <!-- ── Main ───────────────────────────────────────────────────────────── -->
  <main id="main">

    <!-- Filter -->
    <div id="filter-bar">
      <span class="fl-label">Unit</span>
      <input class="fl-input" id="f-unit"   type="number" placeholder="ID"   oninput="onFilterInput()">
      <span class="fl-label">After</span>
      <input class="fl-input" id="f-after"  type="date"                       onchange="onFilterInput()">
      <span class="fl-label">Before</span>
      <input class="fl-input" id="f-before" type="date"                       onchange="onFilterInput()">
      <button id="filter-clear-btn" onclick="clearFilters()">✕ Clear</button>
    </div>

    <!-- Column headers -->
    <div id="board-header">
      <span>Time</span>
      <span>ID</span>
      <span>Channel</span>
      <span>System</span>
      <span>Dur</span>
      <span>Type</span>
    </div>

    <!-- Departure rows -->
    <div id="call-list">
      <div class="empty-state"><div class="icon">📡</div><p>Waiting for transmissions</p></div>
    </div>

    <div id="load-more-wrap">
      <button id="load-more-btn" onclick="loadMore()">Load older</button>
      <span id="load-more-info"></span>
    </div>

    <!-- Departure board player display — always visible -->
    <div id="player-bar">
      <div id="board-display">
        <!-- Row 1: RX + channel name (LED cells) + badges -->
        <div id="bd-r1">
          <div id="rx-ind"><div class="rx-dot"></div>RX</div>
          <div id="bd-channel"></div>
          <div id="bd-badges"></div>
        </div>
        <!-- Row 2: system / group / tgname text -->
        <div id="bd-r2"></div>
        <!-- Row 2b: Freq / Slot / CC — label above each value column -->
        <div id="bd-r2b">
          <div class="led-field">
            <span class="led-field-label">Freq</span>
            <div class="led-seg" id="bd-freq"></div>
          </div>
        </div>
        <!-- Row 3: SNR -->
        <div id="bd-r3">
          <span class="bd-sig-lbl">SNR</span>
          <div id="bd-snr-track"><div id="bd-snr-fill"></div></div>
          <span id="bd-snr-text"></span>
        </div>
        <!-- Row 4: progress bar + unit tick marks -->
        <div id="bd-prog-wrap">
          <div id="bd-ticks"></div>
          <div id="bd-prog"><div id="bd-prog-bar"></div></div>
        </div>
        <!-- Row 5: play/pause + time elapsed + active unit -->
        <div id="bd-r5">
          <button id="bd-playpause" onclick="togglePlayPause()" disabled>▶</button>
          <div id="bd-time"></div>
          <div id="bd-active"></div>
        </div>
        <!-- Row 6: unit chips -->
        <div id="bd-units"></div>
      </div>
      <audio id="audio-el" preload="none"></audio>
    </div>

  </main>
</div>

<script>
'use strict';

// ── Server config ──────────────────────────────────────────────────────────
function loadServerCfg() {
    try { const s = localStorage.getItem('squelch_tail_server'); if (s) return JSON.parse(s); } catch(_) {}
    return { host: location.hostname || 'localhost', port: location.port || '51515' };
}
function saveServerCfg(h, p) { localStorage.setItem('squelch_tail_server', JSON.stringify({ host: h, port: p })); }
function getWsUrl() {
    const { host, port } = loadServerCfg();
    return `${location.protocol === 'https:' ? 'wss' : 'ws'}://${host}:${port}/ws`;
}
function getHttpBase() {
    const { host, port } = loadServerCfg();
    return `${location.protocol === 'https:' ? 'https' : 'http'}://${host}:${port}`;
}

// ── Server panel ───────────────────────────────────────────────────────────
function toggleServerPanel() {
    const panel = document.getElementById('server-panel');
    const btn   = document.getElementById('server-btn');
    const open  = panel.classList.toggle('open');
    btn.classList.toggle('open', open);
    if (open) {
        const { host, port } = loadServerCfg();
        document.getElementById('sp-host').value = host;
        document.getElementById('sp-port').value = port;
        document.getElementById('sp-host').focus();
    }
}
function closeServerPanel() {
    document.getElementById('server-panel').classList.remove('open');
    document.getElementById('server-btn').classList.remove('open');
}
function applyServer() {
    const host = document.getElementById('sp-host').value.trim();
    const port = document.getElementById('sp-port').value.trim();
    if (!host || !port) return;
    saveServerCfg(host, port);
    closeServerPanel();
    reconnect();
}
document.addEventListener('click', e => {
    const panel = document.getElementById('server-panel');
    const btn   = document.getElementById('server-btn');
    if (panel.classList.contains('open') && !panel.contains(e.target) && e.target !== btn)
        closeServerPanel();
});
document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeServerPanel();
    if (e.key === 'Enter' && document.getElementById('server-panel').classList.contains('open'))
        applyServer();
});

// ── State ──────────────────────────────────────────────────────────────────
let ws = null, intentionalClose = false;
let systems = [], filterMap = {};
let displayCalls = [], seenIds = new Set();
let historyTotal = 0, historyLoaded = 0;
const HISTORY_LIMIT = 100;
let filterDebounce = null;
let currentCall = null, volume = 1, liveMode = true;

// ── Analog Enhancements ────────────────────────────────────────────────────
let analogEnabled = localStorage.getItem('analog_enabled') !== 'false';
let audioCtx = null, activeSource = null, activeGain = null, activeBuffer = null;
let progressRaf = null, activeStart = 0, activeDuration = 0;
let isPaused = false, pausedAt = 0;

// ── WebSocket ──────────────────────────────────────────────────────────────
function reconnect() {
    intentionalClose = true;
    if (ws) { try { ws.close(); } catch(_) {} ws = null; }
    intentionalClose = false;
    setConnected(false);
    connect();
}
function connect() {
    document.getElementById('server-url-display').textContent = getWsUrl().replace('/ws', '');
    ws = new WebSocket(getWsUrl());
    ws.addEventListener('open', () => { setConnected(true); sendSubscribe(); loadHistory(true); });
    ws.addEventListener('close', () => { setConnected(false); if (!intentionalClose) setTimeout(connect, 2000); });
    ws.addEventListener('error', () => {});
    ws.addEventListener('message', ev => {
        try {
            const msg = JSON.parse(ev.data);
            if (msg.type === 'config') onConfig(msg);
            else if (msg.type === 'call')  onLiveCall(msg.call);
            else if (msg.type === 'calls') onCalls(msg);
        } catch(_) {}
    });
}
function send(obj) { if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj)); }
function sendSubscribe() {
    const hasFilter = Object.values(filterMap).some(tgs => Object.values(tgs).some(v => v));
    send(hasFilter ? { type: 'subscribe', filter: { systems: filterMap } } : { type: 'subscribe' });
}
function buildSearchOpts(offset) {
    const opts = { type: 'search', limit: HISTORY_LIMIT, offset };
    const unit = parseInt(document.getElementById('f-unit').value);
    const after = document.getElementById('f-after').value;
    const bef   = document.getElementById('f-before').value;
    if (!isNaN(unit)) opts.unitId = unit;
    if (after) opts.after  = new Date(after).getTime();
    if (bef)   opts.before = new Date(bef + 'T23:59:59').getTime();
    return opts;
}
function loadHistory(reset = false) {
    if (reset) { historyLoaded = 0; historyTotal = 0; }
    send(buildSearchOpts(historyLoaded));
}
function loadMore() { loadHistory(false); }

// ── Filter ─────────────────────────────────────────────────────────────────
function onFilterInput() {
    clearTimeout(filterDebounce);
    filterDebounce = setTimeout(() => {
        const live = displayCalls.filter(c => c._live);
        seenIds.clear(); live.forEach(c => seenIds.add(c.id));
        displayCalls = live;
        loadHistory(true);
        updateFilterHighlights();
    }, 350);
}
function updateFilterHighlights() {
    ['f-unit','f-after','f-before'].forEach(id => {
        document.getElementById(id).classList.toggle('active', !!document.getElementById(id).value);
    });
}
function clearFilters() {
    ['f-unit','f-after','f-before'].forEach(id => document.getElementById(id).value = '');
    updateFilterHighlights(); onFilterInput();
}

// ── Event handlers ─────────────────────────────────────────────────────────
function onConfig(msg) { systems = msg.systems || []; buildFilterMap(); renderSidebar(); }

function onLiveCall(call) {
    const sysMap = filterMap[String(call.systemId)];
    if (sysMap && sysMap[String(call.talkgroupId)] === false) return;
    const unitF = parseInt(document.getElementById('f-unit').value);
    if (!isNaN(unitF) && !(call.units||[]).some(u => u.unitId === unitF)) return;
    const av = document.getElementById('f-after').value;
    const bv = document.getElementById('f-before').value;
    if (av && call.startTime < new Date(av).getTime()) return;
    if (bv && call.startTime > new Date(bv+'T23:59:59').getTime()) return;

    call._live = true;
    if (seenIds.has(call.id)) displayCalls = displayCalls.filter(c => c.id !== call.id);
    seenIds.add(call.id);
    displayCalls.unshift(call);
    if (displayCalls.length > 400) { const r = displayCalls.pop(); seenIds.delete(r.id); }
    renderCallList();
    if (liveMode && !currentCall) playCall(call);
    send({ type: 'getConfig' });
}
function onCalls(msg) {
    historyTotal = msg.total || 0;
    const inc = (msg.calls||[]).filter(c => !seenIds.has(c.id));
    inc.forEach(c => seenIds.add(c.id));
    historyLoaded += inc.length;
    displayCalls = [...displayCalls, ...inc];
    renderCallList();
    renderLoadMore();
}

// ── Filter map ─────────────────────────────────────────────────────────────
function buildFilterMap() {
    const n = {};
    for (const sys of systems) {
        const sid = String(sys.id); n[sid] = filterMap[sid] || {};
        for (const tg of (sys.talkgroups||[])) { const tid = String(tg.id); if (!(tid in n[sid])) n[sid][tid] = true; }
    }
    filterMap = n;
}
function toggleTg(sid,tid) { if(!filterMap[sid]) return; filterMap[sid][tid]=!filterMap[sid][tid]; sendSubscribe(); renderSidebar(); }
function toggleSys(sid) { const tgs=filterMap[sid]||{}; const ao=Object.values(tgs).every(v=>v); for(const t in tgs) tgs[t]=!ao; sendSubscribe(); renderSidebar(); }
function toggleAllSystems() {
    const any=Object.values(filterMap).some(tgs=>Object.values(tgs).some(v=>v));
    for(const s in filterMap) for(const t in filterMap[s]) filterMap[s][t]=!any;
    sendSubscribe(); renderSidebar();
}


// ── LED field helper ───────────────────────────────────────────────────────
/**
 * Render text as fixed-width LED character cells.
 * Each character gets its own box; spaces get an invisible box.
 * @param {string|number} text  Value to display
 * @param {number} maxLen       Fixed width (pads or truncates)
 * @param {boolean} dim         If true, use dim class (standby style)
 */
function ledField(text, maxLen, dim = false) {
    const s = String(text == null ? '' : text).toUpperCase().padEnd(maxLen).slice(0, maxLen);
    return s.split('').map(c => {
        const isDim = dim || c === ' ';
        const content = c === ' ' ? '&nbsp;' : c;
        return `<span class="lc${isDim ? ' dim' : ''}">${content}</span>`;
    }).join('');
}

/** Populate a LED segment container, always filling to maxLen cells. */
function setLedSeg(id, text, maxLen, dim = false) {
    document.getElementById(id).innerHTML = ledField(text, maxLen, dim);
}

// ── MDC/Analog processing ──────────────────────────────────────────────────
const MDC_PROBE = [1150,1200,1250,1750,1800,1850];
const CTCSS = [67,69.3,71.9,74.4,77,79.7,82.5,85.4,88.5,91.5,94.8,97.4,100,103.5,107.2,110.9,114.8,118.8,123,127.3,131.8,136.5,141.3,146.2,151.4,156.7,159.8,162.2,165.5,167.9,171.3,173.8,177.3,179.9,183.5,186.2,189.9,192.8,196.6,199.5,203.5,206.5,210.7,218.1,225.7,229.1,233.6,241.8,250.3,254.1];
const MDC_OPTS = {sensitivity:1.1,chirpChunks:2,muteExtension:12,attenuationDb:50,plSensitivity:0.4,plMuteExtension:10};

function goertzel(s,f,sr) {
    const c=2*Math.cos(2*Math.PI*f/sr); let s1=0,s2=0;
    for(let i=0;i<s.length;i++){const s0=s[i]+c*s1-s2;s2=s1;s1=s0;}
    return s1*s1+s2*s2-c*s1*s2;
}
function detectTone(ch,sr,freqs,sens) {
    const N=ch.length; if(!N) return false;
    let sq=0; for(let i=0;i<N;i++) sq+=ch[i]*ch[i];
    const rms=Math.sqrt(sq/N); if(rms<50) return false;
    let mx=0; for(const f of freqs){const a=2*Math.sqrt(Math.max(0,goertzel(ch,f,sr)))/N;if(a>mx)mx=a;}
    return(mx/rms)>sens;
}
function processSamples(mono,sr,o) {
    const {sensitivity:sens,chirpChunks,muteExtension,attenuationDb,plSensitivity,plMuteExtension}=o;
    const csz=Math.round(sr*.02),attn=Math.pow(10,-attenuationDb/20);
    const out=new Float32Array(mono.length); let mute=0,burst=0,pos=0;
    while(pos<mono.length){
        const end=Math.min(pos+csz,mono.length),ch=mono.subarray(pos,end);
        const isMdc=detectTone(ch,sr,MDC_PROBE,sens),isCt=!isMdc&&detectTone(ch,sr,CTCSS,plSensitivity);
        if(isMdc){
            if(mute===0){burst=1;mute=muteExtension;out.set(ch,pos);}
            else{burst++;mute=muteExtension;if(burst<=chirpChunks)out.set(ch,pos);else for(let i=0;i<ch.length;i++)out[pos+i]=ch[i]*attn;}
        }else if(isCt){mute=Math.max(mute,plMuteExtension);burst=0;for(let i=0;i<ch.length;i++)out[pos+i]=ch[i]*attn;}
        else if(mute>0){for(let i=0;i<ch.length;i++)out[pos+i]=ch[i]*attn;if(--mute===0)burst=0;}
        else{out.set(ch,pos);burst=0;}
        pos=end;
    }
    return out;
}
function toggleAnalog() {
    analogEnabled=!analogEnabled;
    localStorage.setItem('analog_enabled',analogEnabled?'true':'false');
    document.getElementById('btn-analog').classList.toggle('active',analogEnabled);
}

// ── Playback ───────────────────────────────────────────────────────────────
function updatePlayPauseBtn() {
    const btn = document.getElementById('bd-playpause');
    if (!currentCall && !isPaused) { btn.textContent = '▶'; btn.disabled = true; return; }
    btn.disabled = false;
    btn.textContent = isPaused ? '▶' : '⏸';
}

function togglePlayPause() {
    if (!currentCall && !isPaused) return;
    const el = document.getElementById('audio-el');
    const bar = document.getElementById('player-bar');

    if (isPaused) {
        // ── Resume ────────────────────────────────────────────────────────
        isPaused = false;
        bar.classList.remove('paused');
        bar.classList.add('playing');
        if (activeBuffer) {
            // Web Audio resume from pausedAt
            const src  = audioCtx.createBufferSource(); src.buffer = activeBuffer;
            const gain = audioCtx.createGain(); gain.gain.value = volume;
            src.connect(gain); gain.connect(audioCtx.destination);
            activeSource = src; activeGain = gain;
            activeStart  = audioCtx.currentTime - pausedAt;
            src.onended = () => {
                if (activeSource === src) { activeSource = null; activeGain = null; }
                if (currentCall) {
                    currentCall = null; isPaused = false; activeBuffer = null;
                    bar.classList.remove('playing');
                    clearBoardDisplay(); updatePlayPauseBtn();
                }
                cancelAnimationFrame(progressRaf);
            };
            src.start(0, pausedAt);
            _trackProgress();
        } else {
            el.play().catch(() => {});
        }
    } else {
        // ── Pause ─────────────────────────────────────────────────────────
        isPaused = true;
        bar.classList.remove('playing');
        bar.classList.add('paused');
        if (activeSource) {
            pausedAt = audioCtx.currentTime - activeStart;
            cancelAnimationFrame(progressRaf);
            try { activeSource.stop(); } catch(_) {}
            activeSource = null; activeGain = null;
        } else {
            pausedAt = el.currentTime;
            el.pause();
        }
    }
    updatePlayPauseBtn();
}

function clearBoardDisplay() {
    // Show standby placeholders in LED fields (dim)
    const chanEl = document.getElementById('bd-channel');
    chanEl.classList.remove('flip');
    chanEl.innerHTML = ledField('STANDBY', 7, true)
        + Array(5).fill('<span class="lc dim">&nbsp;</span>').join('');
    document.getElementById('bd-r2').textContent = '';
    setLedSeg('bd-freq', '──────', 8, true);
    document.getElementById('bd-r3').classList.remove('has-signal');
    document.getElementById('bd-prog-bar').style.width = '0%';
    document.getElementById('bd-time').textContent = '';
    document.getElementById('bd-active').textContent = '';
    document.getElementById('bd-active').classList.remove('on-air');
    document.getElementById('bd-ticks').innerHTML = '';
    document.getElementById('bd-units').innerHTML = '';
    document.getElementById('bd-badges').innerHTML = '';
}

function stopPlayback() {
    cancelAnimationFrame(progressRaf); progressRaf=null;
    if(activeSource){try{activeSource.stop();}catch(_){}activeSource=null;activeGain=null;}
    const el=document.getElementById('audio-el');
    el.pause();el.src='';el.onended=null;el.ontimeupdate=null;
    currentCall=null; isPaused=false; pausedAt=0; activeBuffer=null;
    document.getElementById('player-bar').classList.remove('playing','paused');
    document.querySelectorAll('.dep-row.active').forEach(r=>r.classList.remove('active'));
    document.querySelectorAll('.unit-tick.active').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.bd-chip.active').forEach(c=>c.classList.remove('active'));
    clearBoardDisplay();
    updatePlayPauseBtn();
}

function playCall(call) {
    if(!call.audioUrl) return;
    stopPlayback(); currentCall=call; isPaused=false;
    const url=call.audioUrl.startsWith('http')?call.audioUrl:`${getHttpBase()}${call.audioUrl}`;
    updateBoardDisplay(call);
    document.querySelectorAll('.dep-row').forEach(r=>r.classList.toggle('active',r.dataset.id===String(call.id)));
    const isAnalog=call.audioType?!call.audioType.toLowerCase().includes('digital'):true;
    if(analogEnabled&&isAnalog) _playMdc(call,url); else _playFallback(call,url);
}

function _playFallback(call,url) {
    const el=document.getElementById('audio-el');
    activeBuffer=null; pausedAt=0;
    el.src=url; el.volume=volume; el.play().catch(()=>{});
    updatePlayPauseBtn();
    el.ontimeupdate=()=>{
        if(!el.duration) return;
        const t=el.currentTime;
        document.getElementById('bd-prog-bar').style.width=(t/el.duration*100)+'%';
        document.getElementById('bd-time').textContent=`${t.toFixed(1)}  /  ${el.duration.toFixed(1)}s`;
        _updateActiveUnit(t);
    };
    el.onended=()=>{
        if(currentCall===call){
            currentCall=null;
            document.getElementById('player-bar').classList.remove('playing');
            clearBoardDisplay();
        }
    };
}

function _playMdc(call,url) {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    fetch(url).then(r=>r.arrayBuffer()).then(ab=>audioCtx.decodeAudioData(ab)).then(buf=>{
        if(currentCall!==call) return;
        const len=buf.length,sr=buf.sampleRate,nCh=buf.numberOfChannels;
        const mono=new Float32Array(len);
        for(let c=0;c<nCh;c++){const ch=buf.getChannelData(c);for(let i=0;i<len;i++)mono[i]+=ch[i];}
        const scale=32767/nCh; for(let i=0;i<len;i++) mono[i]*=scale;
        const proc=processSamples(mono,sr,MDC_OPTS);
        const out=audioCtx.createBuffer(1,len,sr),od=out.getChannelData(0);
        for(let i=0;i<len;i++) od[i]=proc[i]/32767;
        if(currentCall!==call) return;
        activeBuffer=out; activeDuration=out.duration;
        const src=audioCtx.createBufferSource(); src.buffer=out;
        const gain=audioCtx.createGain(); gain.gain.value=volume;
        src.connect(gain); gain.connect(audioCtx.destination);
        activeSource=src;activeGain=gain;
        activeStart=audioCtx.currentTime; pausedAt=0;
        src.onended=()=>{
            if(activeSource===src){activeSource=null;activeGain=null;}
            if(currentCall===call){
                currentCall=null; isPaused=false; activeBuffer=null;
                document.getElementById('player-bar').classList.remove('playing');
                clearBoardDisplay(); updatePlayPauseBtn();
            }
            cancelAnimationFrame(progressRaf);
        };
        src.start(); _trackProgress(); updatePlayPauseBtn();
    }).catch(()=>{if(currentCall===call)_playFallback(call,url);});
}

function _trackProgress() {
    cancelAnimationFrame(progressRaf);
    function tick(){
        if(!activeSource||!activeDuration) return;
        const el=audioCtx.currentTime-activeStart;
        const pct=Math.min(100,el/activeDuration*100);
        document.getElementById('bd-prog-bar').style.width=pct+'%';
        document.getElementById('bd-time').textContent=`${el.toFixed(1)}  /  ${activeDuration.toFixed(1)}s`;
        _updateActiveUnit(el);
        if(pct<100) progressRaf=requestAnimationFrame(tick);
    }
    progressRaf=requestAnimationFrame(tick);
}

function _updateActiveUnit(elapsed) {
    if(!currentCall) return;
    const units=currentCall.units||[];
    let best=null;
    for(const u of units) if(u.unitId>=0&&u.pos!=null&&u.pos<=elapsed&&(!best||u.pos>best.pos)) best=u;
    const aid=best?String(best.unitId):null;
    const el=document.getElementById('bd-active');
    if(best){
        el.textContent=best.tag?`${best.unitId}  ${best.tag}`:String(best.unitId);
        el.classList.add('on-air');
    } else {
        el.textContent=''; el.classList.remove('on-air');
    }
    document.querySelectorAll('.unit-tick').forEach(t=>{
        t.classList.toggle('active',t.dataset.unitId===aid&&parseFloat(t.dataset.pos)<=elapsed);
    });
    document.querySelectorAll('.bd-chip').forEach(c=>c.classList.toggle('active',c.dataset.unitId===aid));
}

// ── Board display update ───────────────────────────────────────────────────
function updateBoardDisplay(call) {
    // Channel — LED cells with flip animation
    const chanEl = document.getElementById('bd-channel');
    chanEl.classList.remove('flip');
    void chanEl.offsetWidth;
    const chanStr = call.tgLabel || String(call.talkgroupId);
    const chanCells = Math.max(12, chanStr.length);
    chanEl.innerHTML = ledField(chanStr, chanStr.length)
        + Array(chanCells - chanStr.length).fill('<span class="lc dim">&nbsp;</span>').join('');
    chanEl.classList.add('flip');

    // Badges
    const bdg=document.getElementById('bd-badges'); bdg.innerHTML='';
    if(call.emergency){const b=document.createElement('span');b.className='bd-badge bdb-emerg';b.textContent='EMERG';bdg.appendChild(b);}
    if(call.audioType){
        const isD=call.audioType.toLowerCase().includes('digital');
        const b=document.createElement('span');b.className='bd-badge '+(isD?'bdb-dig':'bdb-ana');b.textContent=call.audioType.toUpperCase();bdg.appendChild(b);
    }
    if(call.phase2Tdma){const b=document.createElement('span');b.className='bd-badge bdb-p25';b.textContent='P25 II';bdg.appendChild(b);}

    // Row 2: system / group / tgname text
    const r2=[];
    if(call.tgGroup) r2.push(call.tgGroup+(call.tgGroupTag?` [${call.tgGroupTag}]`:''));
    if(call.tgName&&call.tgName!==call.tgLabel) r2.push(call.tgName);
    if(call.systemLabel) r2.push(call.systemLabel);
    if((call.patchedTgs||[]).length) r2.push('+ patch '+call.patchedTgs.join(', '));
    document.getElementById('bd-r2').textContent=r2.join('  ·  ');

    // Row 2b: Freq / Slot / CC — LED cells
    const freqStr = call.freq ? (call.freq/1e6).toFixed(4)+(call.freqError?(call.freqError>0?'+':'')+call.freqError:'') : '────────';
    setLedSeg('bd-freq', freqStr, 12);

    // Row 3: SNR
    const r3=document.getElementById('bd-r3');
    if(call.signal!=null||call.noise!=null){
        r3.classList.add('has-signal');
        const snr=(call.signal!=null&&call.noise!=null)?call.signal-call.noise:null;
        const pct=snr!=null?Math.min(100,Math.max(0,snr/30*100)):50;
        const col=!snr?'#0a2a0a':snr<8?'#f87171':snr<15?'#fbbf24':'#4ade80';
        const fill=document.getElementById('bd-snr-fill');
        fill.style.width=pct+'%'; fill.style.background=col;
        const pts=[];
        if(call.signal!=null) pts.push(`SIG ${call.signal} dBm`);
        if(call.noise!=null)  pts.push(`NOISE ${call.noise} dBm`);
        if(snr!=null)         pts.push(`SNR +${snr} dB`);
        document.getElementById('bd-snr-text').textContent=pts.join('  ·  ');
    } else { r3.classList.remove('has-signal'); }

    // Unit ticks
    const ticksEl=document.getElementById('bd-ticks'); ticksEl.innerHTML='';
    const dur=call.callLengthMs?call.callLengthMs/1000:null;
    if(dur&&(call.units||[]).length){
        for(const u of call.units){
            if(u.pos==null||u.unitId<0) continue;
            const t=document.createElement('div'); t.className='unit-tick';
            t.dataset.unitId=String(u.unitId); t.dataset.pos=String(u.pos);
            t.style.left=Math.min(100,u.pos/dur*100)+'%';
            t.title=(u.tag?`${u.unitId} (${u.tag})`:`${u.unitId}`) + `  @  ${u.pos.toFixed(1)}s`;
            ticksEl.appendChild(t);
        }
    }

    document.getElementById('bd-prog-bar').style.width='0%';
    document.getElementById('bd-time').textContent='';

    // Unit chips
    const uEl=document.getElementById('bd-units'); uEl.innerHTML='';
    for(const u of (call.units||[]).filter(u=>u.unitId>=0)){
        const c=document.createElement('div'); c.className='bd-chip';
        c.dataset.unitId=String(u.unitId);
        c.textContent=u.tag?`${u.unitId}  ${u.tag}`:String(u.unitId);
        if(u.emergency) c.style.borderColor='var(--red)';
        uEl.appendChild(c);
    }

    document.getElementById('bd-active').textContent='';
    document.getElementById('bd-active').classList.remove('on-air');
    document.getElementById('player-bar').classList.add('playing');
}

// ── Sidebar ────────────────────────────────────────────────────────────────
function renderSidebar() {
    const list=document.getElementById('systems-list'); list.innerHTML='';
    for(const sys of systems){
        const sid=String(sys.id),tgs=sys.talkgroups||[],tgMap=filterMap[sid]||{};
        const on=tgs.filter(tg=>tgMap[String(tg.id)]).length;
        const allOn=on===tgs.length&&tgs.length>0,part=on>0&&!allOn;
        const item=document.createElement('div'); item.className='sys-item';
        const hdr=document.createElement('div'); hdr.className='sys-header';
        const tog=document.createElement('div'); tog.className='sys-toggle'+(allOn?' on':part?' partial':'');
        tog.textContent=allOn?'✓':part?'─':'';
        tog.onclick=e=>{e.stopPropagation();toggleSys(sid);};
        const lbl=document.createElement('span'); lbl.textContent=sys.label||`System ${sys.id}`;
        const chev=document.createElement('span'); chev.className='sys-chevron open'; chev.textContent='▶';
        hdr.appendChild(tog);hdr.appendChild(lbl);hdr.appendChild(chev);
        const tgList=document.createElement('div'); tgList.className='tg-list open';
        for(const tg of tgs){
            const tid=String(tg.id),on2=!!tgMap[tid];
            const row=document.createElement('div'); row.className='tg-item';
            const chk=document.createElement('div'); chk.className='tg-check'+(on2?' on':''); chk.textContent=on2?'✓':'';
            const tl=document.createElement('span'); tl.className='tg-label'; tl.textContent=tg.label||tg.name||String(tg.id); tl.title=tg.name||tg.label||'';
            const ti=document.createElement('span'); ti.className='tg-id'; ti.textContent=tg.id;
            row.appendChild(chk);row.appendChild(tl);row.appendChild(ti);
            row.onclick=()=>toggleTg(sid,tid); tgList.appendChild(row);
        }
        hdr.onclick=()=>{const o=tgList.classList.toggle('open');chev.classList.toggle('open',o);};
        item.appendChild(hdr);item.appendChild(tgList);list.appendChild(item);
    }
}

// ── Call list (departure board rows) ──────────────────────────────────────
function renderCallList() {
    const list=document.getElementById('call-list');
    if(!displayCalls.length){
        list.innerHTML='<div class="empty-state"><div class="icon">📡</div><p>No transmissions</p></div>';
        return;
    }
    list.innerHTML='';
    for(const call of displayCalls){
        // Main departure row
        const row=document.createElement('div');
        row.className='dep-row'+(call.emergency?' emergency':'');
        row.dataset.id=call.id;
        if(currentCall&&currentCall.id===call.id) row.classList.add('active');

        const dt=new Date(call.startTime);
        const dur=call.callLengthMs?(call.callLengthMs/1000).toFixed(1)+'s':'';
        const isDigital=call.audioType&&call.audioType.toLowerCase().includes('digital');
        const typeStr=call.audioType?call.audioType.substring(0,3).toUpperCase():'';

        const t=ce('div','dc-time'); t.textContent=fmtTime(dt);
        const id=ce('div','dc-id'); id.textContent=call.talkgroupId!=null?call.talkgroupId:'';
        const ch=ce('div','dc-channel'); ch.textContent=call.tgLabel||'';
        const sys=ce('div','dc-sys'); sys.textContent=call.systemLabel||`Sys ${call.systemId}`;
        const d=ce('div','dc-dur'); d.textContent=dur;
        const ty=ce('div','dc-type '+(isDigital?'type-dig':'type-ana')); ty.textContent=typeStr;

        row.appendChild(t);row.appendChild(id);row.appendChild(ch);
        row.appendChild(sys);row.appendChild(d);row.appendChild(ty);

        // Detail line: zone · freq · snr · patches · emergency
        const detParts=[];
        if(call.tgGroup)  detParts.push({text:call.tgGroup+(call.tgGroupTag?` [${call.tgGroupTag}]`:''),cls:'dd-group'});
        if(call.tgName&&call.tgName!==call.tgLabel) detParts.push({text:call.tgName,cls:'dd-group'});
        if(call.freq)     detParts.push({text:(call.freq/1e6).toFixed(4)+' MHz',cls:'dd-freq'});
        if((call.patchedTgs||[]).length) detParts.push({text:'+ patch '+call.patchedTgs.join(', '),cls:'dd-patch'});
        if(call.emergency) detParts.push({text:'EMERGENCY',cls:'dd-emerg'});

        if(detParts.length){
            const det=ce('div','dep-detail');
            for(const p of detParts){const s=ce('span',p.cls);s.textContent=p.text;det.appendChild(s);}
            row.appendChild(det);
        }

        // Units
        const units=(call.units||[]).filter(u=>u.unitId>=0);
        if(units.length){
            const uRow=ce('div','dep-units');
            for(const u of units.slice(0,10)){
                const c=ce('span','unit-chip');
                c.textContent=u.tag?`${u.unitId} (${u.tag})`:String(u.unitId);
                uRow.appendChild(c);
            }
            row.appendChild(uRow);
        }

        row.addEventListener('click',()=>playCall(call));
        list.appendChild(row);
    }
}

function ce(tag,cls){const e=document.createElement(tag);if(cls)e.className=cls;return e;}

function renderLoadMore() {
    const wrap=document.getElementById('load-more-wrap');
    const info=document.getElementById('load-more-info');
    const lc=displayCalls.filter(c=>c._live).length;
    const shown=displayCalls.length-lc;
    const more=shown<historyTotal;
    wrap.classList.toggle('visible',more);
    if(more) info.textContent=`${shown.toLocaleString()} / ${historyTotal.toLocaleString()}`;
}

// ── Status / helpers ───────────────────────────────────────────────────────
function setConnected(on) {
    const badge = document.getElementById('live-badge');
    badge.classList.toggle('connected', on && liveMode);
    badge.classList.toggle('standby',   on && !liveMode);
    document.getElementById('server-url-display').textContent=getWsUrl().replace('/ws','');
}
function toggleLiveMode() {
    liveMode = !liveMode;
    document.getElementById('live-label').textContent = liveMode ? 'LIVE' : 'STANDBY';
    const badge = document.getElementById('live-badge');
    const connected = badge.classList.contains('connected') || badge.classList.contains('standby');
    badge.classList.toggle('connected', connected && liveMode);
    badge.classList.toggle('standby',   connected && !liveMode);
}
function fmtTime(dt) {
    if(!dt) return '';
    return dt.toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
document.getElementById('volume').addEventListener('input',e=>{
    volume=parseFloat(e.target.value);
    document.getElementById('audio-el').volume=volume;
    if(activeGain) activeGain.gain.value=volume;
});

// ── Init ───────────────────────────────────────────────────────────────────
document.getElementById('server-url-display').textContent=getWsUrl().replace('/ws','');
document.getElementById('btn-analog').classList.toggle('active',analogEnabled);
clearBoardDisplay();
updatePlayPauseBtn();
connect();
</script>
