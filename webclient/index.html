*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
    --bg:#0a0904; --bg2:#141209; --bg3:#1e1c12; --bg4:#2a2718;
    --amb:#f5b030; --amb2:#d89020; --amb3:#b07830; --amb4:#7a5520; --amb5:#3e2e0e;
    --white:#f5f0e0; --green:#22c55e; --green2:#0d4020; --red:#ef4444; --border:#2a2510;
    --lcd-bg:#060503; --lcd-hi:#f0d840; --lcd-mid:#b89a18; --lcd-dim:#4a3c08;
    --row-hover:rgba(245,176,48,.04); --row-active:rgba(245,176,48,.09);
    --item-hover:rgba(245,176,48,.05); --toggle-on-bg:rgba(245,176,48,.15);
    --lc-bg:#1a1500; --lc-border:#2a2200;
    --scanner-dot:rgba(232,149,10,.025);
    --scanner-glow:rgba(240,216,64,.3);
    --chip-active-bg:rgba(240,216,64,.06);
    --chip-active-shadow:rgba(240,216,64,.18);
    --font-board:'Share Tech Mono','Fira Code','Consolas',monospace;
    --font-ui:-apple-system,'Segoe UI',system-ui,sans-serif;
    --font-lcd:'VT323','Share Tech Mono',monospace;
    --font-sub:'SubwayTicker','VT323','Share Tech Mono',monospace;
}
html,body { height:100%; background:var(--bg); color:var(--amb); font-family:var(--font-ui); font-size:16px; line-height:1.4; overflow:hidden; text-rendering:optimizeLegibility; }

/* Layout */
#app { display:grid; grid-template-rows:auto 1fr; grid-template-columns:220px 1fr 300px; height:100vh; }
#header { grid-column:1/-1; background:var(--bg2); border-bottom:1px solid var(--amb5); padding:6px 14px; display:flex; align-items:center; gap:14px; flex-wrap:nowrap; position:relative; }
#col-filters { background:var(--bg2); border-right:1px solid var(--amb5); display:flex; flex-direction:column; overflow:hidden; }
#col-calls { display:flex; flex-direction:column; overflow:hidden; border-right:1px solid var(--amb5); }
#col-scanner { background:var(--lcd-bg); background-image:radial-gradient(circle,var(--scanner-dot) 1px,transparent 1px); background-size:3px 3px; display:flex; flex-direction:column; overflow:hidden; position:relative; }
#col-scanner::after { content:''; position:absolute; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.06) 2px,rgba(0,0,0,.06) 3px); pointer-events:none; z-index:0; }
#col-scanner>* { position:relative; z-index:1; }

/* Header */
#live-badge { display:flex; align-items:center; gap:5px; font-size:13px; letter-spacing:.18em; color:var(--amb4); text-transform:uppercase; cursor:pointer; user-select:none; flex-shrink:0; }
#live-badge.connected { color:var(--green); } #live-badge.standby { color:var(--amb2); }
.live-dot { width:7px; height:7px; border-radius:50%; background:currentColor; flex-shrink:0; }
#live-badge.connected .live-dot { animation:livepulse 2s ease-in-out infinite; }
@keyframes livepulse { 0%,100%{opacity:1} 50%{opacity:.15} }
.hdr-btn { padding:3px 9px; background:transparent; border:1px solid var(--amb4); color:var(--amb3); cursor:pointer; font-size:12px; letter-spacing:.1em; text-transform:uppercase; transition:all .1s; white-space:nowrap; flex-shrink:0; }
.hdr-btn.active { background:var(--amb); color:var(--bg); border-color:var(--amb); font-weight:bold; }
.hdr-btn:hover:not(.active) { border-color:var(--amb2); color:var(--amb2); }
#volume-wrap { display:flex; align-items:center; gap:8px; margin-left:auto; flex-shrink:0; }
#volume-wrap label { font-size:12px; letter-spacing:.18em; color:var(--amb3); text-transform:uppercase; }
#volume { accent-color:var(--amb); width:72px; cursor:pointer; }
#server-btn { padding:3px 7px; background:transparent; border:1px solid var(--amb4); color:var(--amb3); cursor:pointer; font-size:17px; line-height:1; transition:all .1s; flex-shrink:0; }
#server-btn:hover,#server-btn.open { border-color:var(--amb); color:var(--amb); }
#server-url-display { color:var(--amb4); font-size:12px; letter-spacing:.06em; max-width:160px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex-shrink:0; }
#server-panel { display:none; position:absolute; top:calc(100% + 4px); right:0; background:var(--bg2); border:1px solid var(--amb); padding:12px 14px; z-index:200; min-width:240px; box-shadow:0 8px 32px rgba(0,0,0,.8); }
#server-panel.open { display:block; }
#server-panel label { display:block; color:var(--amb3); font-size:12px; text-transform:uppercase; letter-spacing:.14em; margin-bottom:4px; margin-top:10px; }
#server-panel label:first-of-type { margin-top:0; }
.srv-input { width:100%; background:var(--bg3); border:1px solid var(--amb4); color:var(--amb); font-size:15px; padding:5px 8px; }
.srv-input:focus { outline:none; border-color:var(--amb); }
#server-panel-actions { display:flex; gap:6px; margin-top:12px; }
.srv-btn { flex:1; padding:5px 0; border:1px solid var(--amb4); background:transparent; color:var(--amb3); cursor:pointer; font-size:13px; text-transform:uppercase; letter-spacing:.1em; transition:all .1s; }
.srv-btn.primary { background:var(--amb); border-color:var(--amb); color:var(--bg); font-weight:bold; }
.srv-btn.primary:hover { background:var(--amb2); border-color:var(--amb2); }
.srv-btn:not(.primary):hover { border-color:var(--amb2); color:var(--amb2); }

/* Col section header */
.col-section-hdr { padding:5px 10px 4px; color:var(--amb3); font-size:11px; letter-spacing:.22em; text-transform:uppercase; border-bottom:1px solid var(--amb5); background:var(--bg2); flex-shrink:0; display:flex; justify-content:space-between; align-items:center; }

/* Global play/pause */
#global-play-wrap { padding:8px 10px; border-bottom:1px solid var(--amb5); display:flex; align-items:center; gap:10px; flex-shrink:0; background:var(--bg2); transition:background .2s; }
#global-playpause { background:transparent; border:2px solid var(--amb4); color:var(--amb4); font-size:22px; width:48px; height:48px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all .15s; padding:0; line-height:1; border-radius:2px; }
#global-playpause:disabled { opacity:.3; cursor:default; }
#global-playpause:not(:disabled):hover { border-color:var(--amb2); color:var(--amb2); }
#global-playpause.playing { border-color:var(--amb); color:var(--amb); box-shadow:0 0 8px var(--scanner-glow); }
#global-playpause.paused { border-color:var(--amb2); color:var(--amb2); }
#global-play-info { flex:1; min-width:0; }
#global-play-channel { font-size:13px; color:var(--amb4); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; transition:color .2s; }
#global-play-meta { font-size:11px; color:var(--amb5); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; transition:color .2s; }
#global-play-wrap.playing #global-play-channel { color:var(--amb); }
#global-play-wrap.playing #global-play-meta { color:var(--amb3); }
#global-play-wrap.paused #global-play-channel { color:var(--amb2); }
#global-play-wrap.paused #global-play-meta { color:var(--amb4); }
#global-play-wrap.standby #global-playpause { border-color:var(--amb5); color:var(--amb5); }
#global-play-wrap.standby #global-play-channel { color:var(--amb4); letter-spacing:.08em; }

/* Plugins */
#plugins-section { padding:4px 8px 6px; border-bottom:1px solid var(--amb5); display:flex; flex-direction:column; gap:2px; flex-shrink:0; }
.plugin-row { display:flex; align-items:center; justify-content:space-between; padding:3px 4px; cursor:pointer; transition:background .1s; }
.plugin-row:hover { background:var(--item-hover); }
.plugin-label { font-size:13px; color:var(--amb3); letter-spacing:.04em; flex:1; }
.plugin-toggle { width:28px; height:14px; border:1px solid var(--amb4); background:var(--bg3); cursor:pointer; position:relative; transition:all .15s; flex-shrink:0; }
.plugin-toggle::after { content:''; position:absolute; top:1px; left:1px; width:10px; height:10px; background:var(--amb4); transition:all .15s; }
.plugin-toggle.on { background:var(--toggle-on-bg); border-color:var(--amb); }
.plugin-toggle.on::after { background:var(--amb); left:15px; }

/* Theme row */
.theme-label-row { display:flex; align-items:center; justify-content:space-between; padding:3px 4px 2px; }
.theme-label-row .plugin-label { cursor:default; }
.theme-badge { font-size:10px; letter-spacing:.14em; text-transform:uppercase; padding:1px 5px; border:1px solid; font-family:var(--font-board); }
.theme-badge.dark { color:var(--amb4); border-color:var(--amb5); }
.theme-badge.light { color:#60a8e0; border-color:#2a5080; }
#theme-select-wrap { padding:2px 4px 4px; }
#theme-select { width:100%; background:var(--bg3); border:1px solid var(--amb4); color:var(--amb3); font-size:12px; padding:3px 5px; cursor:pointer; outline:none; }
#theme-select:focus { border-color:var(--amb); }
#theme-select option,#theme-select optgroup { background:var(--bg2); color:var(--amb3); }

/* Filter section */
#filter-section { padding:5px 8px 6px; border-bottom:1px solid var(--amb5); display:flex; flex-direction:column; gap:5px; flex-shrink:0; }
.filter-row { display:flex; align-items:center; gap:6px; }
.fl-label { color:var(--amb3); font-size:11px; letter-spacing:.14em; text-transform:uppercase; width:34px; flex-shrink:0; }
.fl-input { flex:1; background:var(--bg3); border:1px solid var(--amb5); border-bottom-color:var(--amb4); color:var(--amb); font-size:13px; padding:2px 5px; min-width:0; }
.fl-input[type="date"] { color-scheme:dark; }
.fl-input:focus { outline:none; border-color:var(--amb2); }
.fl-input.active { border-color:var(--amb); color:var(--white); }
#filter-clear-btn { padding:2px 6px; background:transparent; border:1px solid var(--amb4); color:var(--amb3); cursor:pointer; font-size:11px; text-transform:uppercase; letter-spacing:.1em; align-self:flex-end; }
#filter-clear-btn:hover { border-color:var(--amb2); color:var(--amb2); }

/* Systems */
#systems-hdr { padding:5px 10px 4px; color:var(--amb3); font-size:11px; letter-spacing:.22em; text-transform:uppercase; border-bottom:1px solid var(--amb5); background:var(--bg2); flex-shrink:0; display:flex; justify-content:space-between; align-items:center; }
#toggle-all-btn { font-size:11px; padding:1px 6px; background:transparent; border:1px solid var(--amb4); color:var(--amb3); cursor:pointer; letter-spacing:.08em; text-transform:uppercase; }
#toggle-all-btn:hover { border-color:var(--amb); color:var(--amb); }
#systems-list { flex:1; overflow-y:auto; padding:2px 0; min-height:0; }
.sys-item { padding:3px 8px; user-select:none; }
.sys-header { display:flex; align-items:center; gap:6px; color:var(--amb2); font-size:13px; cursor:pointer; padding:2px 0; }
.sys-header:hover { background:var(--item-hover); }
.sys-toggle { width:11px; height:11px; border:1px solid var(--amb4); background:transparent; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:10px; transition:all .1s; }
.sys-toggle.on { background:var(--amb); border-color:var(--amb); color:var(--bg); }
.sys-toggle.partial { background:var(--amb3); border-color:var(--amb2); color:var(--amb); }
.sys-chevron { color:var(--amb4); transition:transform .2s; flex-shrink:0; margin-left:auto; font-size:11px; }
.sys-chevron.open { transform:rotate(90deg); }
.tg-list { padding:2px 0 2px 16px; display:none; }
.tg-list.open { display:block; }
.tg-item { display:flex; align-items:center; gap:5px; padding:2px 3px; cursor:pointer; }
.tg-item:hover { background:var(--item-hover); }
.tg-check { width:9px; height:9px; border:1px solid var(--amb4); background:transparent; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:7px; transition:all .1s; }
.tg-check.on { background:var(--amb); border-color:var(--amb); color:var(--bg); }
.tg-label { color:var(--amb3); font-size:12px; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.tg-id { color:var(--amb4); font-size:11px; }

/* Call list — 7 columns: Time|ID|Channel|Freq|System|Dur|Type */
#board-header { display:grid; grid-template-columns:60px 42px 1fr 65px 78px 34px 58px; padding:4px 8px 3px; border-bottom:1px solid var(--amb); background:var(--bg2); font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--amb3); flex-shrink:0; }
#call-list { flex:1; overflow-y:auto; min-height:0; }
.dep-row { display:grid; grid-template-columns:60px 42px 1fr 65px 78px 34px 58px; padding:3px 8px 0; cursor:pointer; transition:background .1s; border-bottom:1px solid var(--amb5); align-items:center; }
.dep-row:hover { background:var(--row-hover); }
.dep-row.active { background:var(--row-active); }
.dep-row.emergency { border-left:2px solid var(--red); }
.dep-detail { grid-column:1/-1; padding:1px 0 3px; font-size:11px; color:var(--amb5); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; display:flex; gap:6px; align-items:center; }
.dc-time { font-size:12px; color:var(--amb3); white-space:nowrap; letter-spacing:.02em; }
.dc-id { font-size:12px; color:var(--amb2); white-space:nowrap; padding-left:2px; }
.dc-channel { font-size:13px; color:var(--amb); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; padding-left:2px; letter-spacing:.02em; }
.dc-freq { font-size:12px; color:var(--amb3); white-space:nowrap; padding-left:2px; font-family:var(--font-board); }
.dc-sys { font-size:11px; color:var(--amb3); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; padding-left:2px; }
.dc-dur { font-size:11px; color:var(--amb3); text-align:right; white-space:nowrap; }
.dc-type { font-size:11px; text-align:right; white-space:nowrap; color:var(--amb3); padding-left:2px; font-family:var(--font-board); }
.dep-row.active .dc-channel { color:var(--white); }
.dep-row.active .dc-id { color:var(--amb); }
.dep-row.active .dc-time,.dep-row.active .dc-freq { color:var(--amb2); }
.dd-date { color:var(--amb4); }
.dd-group { color:var(--amb5); }
.dd-patch { color:var(--amb4); font-style:italic; }
.dd-emerg { color:var(--red); letter-spacing:.1em; font-size:10px; }
.unit-chip { font-size:10px; color:var(--amb5); border:1px solid var(--amb5); padding:0 3px; }
.type-ana { color:var(--amb2); } .type-dig { color:#3b82f6; }

/* Pagination */
#pagination { display:flex; align-items:center; gap:6px; padding:4px 8px; border-top:1px solid var(--amb5); background:var(--bg2); flex-shrink:0; }
.pg-btn { padding:2px 9px; background:transparent; border:1px solid var(--amb4); color:var(--amb3); cursor:pointer; font-size:11px; text-transform:uppercase; letter-spacing:.1em; transition:all .1s; }
.pg-btn:hover:not(:disabled) { border-color:var(--amb); color:var(--amb); }
.pg-btn:disabled { opacity:.3; cursor:default; }
#pg-info { font-size:11px; color:var(--amb4); letter-spacing:.06em; flex:1; text-align:center; }
#load-more-btn { padding:2px 9px; background:transparent; border:1px solid var(--amb4); color:var(--amb3); cursor:pointer; font-size:11px; text-transform:uppercase; letter-spacing:.1em; transition:all .1s; display:none; }
#load-more-btn.visible { display:block; }
#load-more-btn:hover { border-color:var(--amb); color:var(--amb); }

/* Scanner column */
#scanner-header { padding:6px 10px 5px; border-bottom:2px solid var(--amb5); display:flex; align-items:center; gap:8px; flex-shrink:0; }
#rx-ind { display:flex; align-items:center; gap:4px; font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--lcd-dim); white-space:nowrap; flex-shrink:0; transition:color .2s; }
.rx-dot { width:7px; height:7px; border-radius:50%; background:var(--lcd-dim); flex-shrink:0; transition:all .2s; }
#col-scanner.playing #rx-ind { color:var(--lcd-hi); }
#col-scanner.playing .rx-dot { background:var(--lcd-hi); box-shadow:0 0 6px var(--lcd-mid); animation:rxblink .85s ease-in-out infinite; }
@keyframes rxblink { 0%,100%{opacity:1} 50%{opacity:.1} }
#sc-badges { display:flex; gap:4px; align-items:center; margin-left:auto; }
.bd-badge { font-family:var(--font-board); font-size:10px; font-weight:bold; letter-spacing:.1em; padding:1px 4px; border:1px solid; flex-shrink:0; text-transform:uppercase; }
.bdb-ana { color:#7a4d05; border-color:#3d2503; } .bdb-dig { color:#1e3a5f; border-color:#172a4a; }
.bdb-p25 { color:#1e3a5f; border-color:#172a4a; } .bdb-emerg { color:#ef4444; border-color:#ef4444; animation:emergblink 1s ease-in-out infinite; }
@keyframes emergblink { 0%,100%{opacity:1} 50%{opacity:.2} }
#col-scanner.playing .bdb-ana { color:#fcd34d; border-color:#d97706; }
#col-scanner.playing .bdb-dig { color:#93c5fd; border-color:#3b82f6; }
#col-scanner.playing .bdb-p25 { color:#93c5fd; border-color:#3b82f6; }
#sc-channel-wrap { padding:8px 10px 4px; border-bottom:1px solid var(--lcd-dim); flex-shrink:0; }
#sc-channel { font-family:var(--font-sub); font-size:32px; line-height:1.1; color:var(--lcd-dim); overflow:hidden; white-space:nowrap; display:flex; align-items:center; transition:color .2s; min-height:40px; }
#col-scanner.playing #sc-channel { color:var(--lcd-hi); text-shadow:0 0 10px var(--scanner-glow); }
@keyframes flipin { 0%{transform:perspective(600px) rotateX(-80deg);opacity:0} 100%{transform:perspective(600px) rotateX(0);opacity:1} }
.flip { animation:flipin .25s ease-out; }
#sc-info { padding:4px 10px 2px; font-size:12px; color:var(--lcd-dim); letter-spacing:.04em; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex-shrink:0; min-height:16px; transition:color .2s; }
#col-scanner.playing #sc-info { color:#6a5a10; }
#sc-fields { padding:4px 10px 2px; display:flex; gap:20px; flex-wrap:wrap; font-size:16px; color:var(--lcd-dim); flex-shrink:0; transition:color .2s; }
#col-scanner.playing #sc-fields { color:var(--lcd-hi); }
.led-field { display:flex; flex-direction:column; gap:2px; }
.led-field-label { font-family:-apple-system,'Segoe UI',system-ui,sans-serif; font-size:10px; font-weight:600; letter-spacing:.16em; color:var(--lcd-dim); text-transform:uppercase; }
#col-scanner.playing .led-field-label { color:var(--lcd-mid); }
.led-seg { display:flex; align-items:center; }
#sc-snr { padding:2px 10px; display:none; align-items:center; gap:8px; font-size:11px; color:var(--lcd-dim); flex-shrink:0; }
#sc-snr.has-signal { display:flex; }
.bd-sig-lbl { font-family:-apple-system,'Segoe UI',system-ui,sans-serif; font-size:11px; font-weight:600; letter-spacing:.16em; text-transform:uppercase; color:var(--lcd-dim); flex-shrink:0; }
#col-scanner.playing .bd-sig-lbl { color:var(--lcd-mid); }
#sc-snr-track { width:50px; height:2px; background:var(--lcd-dim); flex-shrink:0; }
#sc-snr-fill { height:100%; width:0%; transition:width .5s ease,background .5s ease; }
#sc-snr-text { font-size:11px; letter-spacing:.04em; color:var(--lcd-dim); white-space:nowrap; transition:color .2s; }
#col-scanner.playing #sc-snr-text { color:var(--lcd-mid); }
#sc-prog-wrap { padding:6px 10px 2px; flex-shrink:0; position:relative; }
#sc-ticks { position:absolute; top:6px; left:10px; right:10px; height:5px; pointer-events:none; }
.unit-tick { position:absolute; top:0; width:1px; height:5px; background:var(--lcd-dim); transform:translateX(-50%); transition:all .12s; }
.unit-tick.active { background:var(--lcd-hi); width:2px; box-shadow:0 0 3px var(--lcd-hi); }
#sc-prog { height:6px; background:var(--lcd-dim); overflow:hidden; margin-top:5px; cursor:pointer; border-radius:2px; }
#sc-prog-bar { height:100%; width:0%; background:var(--lcd-hi); transition:width .2s linear; box-shadow:0 0 3px var(--lcd-mid); }
#sc-controls { padding:4px 10px; display:flex; align-items:center; gap:8px; flex-shrink:0; border-top:1px solid var(--lcd-dim); }
#sc-playpause { background:transparent; border:1px solid var(--lcd-dim); color:var(--lcd-dim); font-size:16px; width:26px; height:22px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all .1s; padding:0; line-height:1; }
#sc-playpause:disabled { opacity:.3; cursor:default; }
#sc-playpause:not(:disabled):hover { border-color:var(--lcd-mid); color:var(--lcd-mid); }
#col-scanner.playing #sc-playpause { border-color:var(--lcd-hi); color:var(--lcd-hi); }
#col-scanner.paused #sc-playpause { border-color:#d89020; color:#d89020; }
.sc-skip { background:transparent; border:1px solid var(--lcd-dim); color:var(--lcd-dim); font-size:11px; width:22px; height:22px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all .1s; padding:0; line-height:1; }
.sc-skip:disabled { opacity:.25; cursor:default; }
.sc-skip:not(:disabled):hover { border-color:var(--lcd-mid); color:var(--lcd-mid); }
.global-skip { background:transparent; border:2px solid var(--amb5); color:var(--amb5); font-size:13px; width:32px; height:32px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all .15s; padding:0; line-height:1; border-radius:2px; }
.global-skip:disabled { opacity:.25; cursor:default; }
.global-skip:not(:disabled):hover { border-color:var(--amb3); color:var(--amb3); }
#sc-time { font-size:11px; letter-spacing:.1em; color:var(--lcd-dim); white-space:nowrap; flex-shrink:0; min-width:88px; transition:color .2s; }
#col-scanner.playing #sc-time { color:var(--lcd-mid); }
#sc-active { font-family:var(--font-sub); font-size:16px; color:var(--lcd-dim); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; letter-spacing:.04em; transition:color .12s; }
#sc-active.on-air { color:var(--lcd-hi); }
#sc-active.on-air::before { content:'▶ '; font-size:15px; opacity:.7; }
#sc-units { padding:4px 10px; display:flex; gap:4px; flex-wrap:wrap; min-height:22px; flex-shrink:0; }
.bd-chip { font-family:var(--font-board); font-size:11px; color:var(--lcd-dim); border:1px solid var(--lcd-dim); padding:0 5px; letter-spacing:.04em; transition:all .12s; cursor:default; }
.bd-chip.active { color:var(--lcd-hi); border-color:var(--lcd-mid); background:var(--chip-active-bg); box-shadow:0 0 4px var(--chip-active-shadow); }
#sc-queue { padding:4px 10px; flex-shrink:0; border-top:1px solid var(--lcd-dim); font-size:11px; letter-spacing:.12em; color:var(--lcd-dim); display:flex; align-items:center; gap:8px; }
#sc-queue-count { color:var(--amb3); } #sc-queue-next { color:var(--lcd-dim); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
#sc-standby { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--lcd-dim); gap:8px; }
#sc-standby .sc-standby-icon { font-size:24px; opacity:.3; }
#sc-standby p { font-size:12px; letter-spacing:.18em; text-transform:uppercase; }

/* LED cells */
.lc { display:inline-flex; align-items:center; justify-content:center; width:.63em; min-height:1.1em; background:var(--lc-bg); border:1px solid var(--lc-border); margin:0 1px; font-family:var(--font-sub); color:inherit; line-height:1; flex-shrink:0; box-sizing:border-box; }
.lc.dim { color:#4a3c08; }
audio { display:none; }
.empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:var(--amb4); gap:10px; }
.empty-state .icon { font-size:28px; opacity:.3; }
.empty-state p { font-size:13px; letter-spacing:.14em; text-transform:uppercase; }
::-webkit-scrollbar { width:4px; } ::-webkit-scrollbar-track { background:var(--bg); } ::-webkit-scrollbar-thumb { background:var(--amb5); } ::-webkit-scrollbar-thumb:hover { background:var(--amb4); }
</style>

<body>
<div id="app">
  <header id="header">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 130" width="160" height="44">
      <defs>
        <linearGradient id="activeGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#d97706"/></linearGradient>
        <linearGradient id="tailGrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#f59e0b" stop-opacity="0.7"/><stop offset="100%" stop-color="#f59e0b" stop-opacity="0.08"/></linearGradient>
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="2.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <g fill="url(#activeGrad)" filter="url(#glow)">
        <rect x="20" y="44" width="6" height="28" rx="2"/><rect x="20" y="72" width="6" height="28" rx="2"/>
        <rect x="29" y="36" width="6" height="36" rx="2"/><rect x="29" y="72" width="6" height="36" rx="2"/>
        <rect x="38" y="30" width="6" height="42" rx="2"/><rect x="38" y="72" width="6" height="42" rx="2"/>
        <rect x="47" y="20" width="6" height="52" rx="2"/><rect x="47" y="72" width="6" height="52" rx="2"/>
        <rect x="56" y="14" width="6" height="58" rx="2"/><rect x="56" y="72" width="6" height="58" rx="2"/>
        <rect x="65" y="24" width="6" height="48" rx="2"/><rect x="65" y="72" width="6" height="48" rx="2"/>
        <rect x="74" y="28" width="6" height="44" rx="2"/><rect x="74" y="72" width="6" height="44" rx="2"/>
        <rect x="83" y="16" width="6" height="56" rx="2"/><rect x="83" y="72" width="6" height="56" rx="2"/>
        <rect x="92" y="22" width="6" height="50" rx="2"/><rect x="92" y="72" width="6" height="50" rx="2"/>
        <rect x="101" y="34" width="6" height="38" rx="2"/><rect x="101" y="72" width="6" height="38" rx="2"/>
        <rect x="110" y="42" width="6" height="30" rx="2"/><rect x="110" y="72" width="6" height="30" rx="2"/>
      </g>
      <g fill="url(#tailGrad)">
        <rect x="122" y="54" width="6" height="18" rx="2"/><rect x="122" y="72" width="6" height="18" rx="2"/>

let currentThemeKey = 'goldenrod';
function applyTheme(key) {
  const t = THEMES[key] || THEMES.goldenrod;
  const root = document.documentElement;
  for (const [k,v] of Object.entries(t.vars)) root.style.setProperty(k, v);
  const badge = document.getElementById('theme-badge');
  badge.textContent = t.dark ? 'Dark' : 'Light';
  badge.className = 'theme-badge ' + (t.dark ? 'dark' : 'light');
  // light-theme body text
  document.body.style.color = t.dark ? '' : t.vars['--amb3'];
  localStorage.setItem('squelch_theme', key);
  currentThemeKey = key;
}
function applyThemeByName(key) {
  applyTheme(key);
  document.getElementById('theme-select').value = key;
}

// ── Server config ──────────────────────────────────────────────────────────
function loadServerCfg() {
  try { const s=localStorage.getItem('squelch_tail_server'); if(s) return JSON.parse(s); } catch(_){}
  return { host: location.hostname||'localhost', port: location.port||'51515' };
}
function saveServerCfg(h,p) { localStorage.setItem('squelch_tail_server', JSON.stringify({host:h,port:p})); }
function getWsUrl() { const {host,port}=loadServerCfg(); return `${location.protocol==='https:'?'wss':'ws'}://${host}:${port}/ws`; }
function getHttpBase() { const {host,port}=loadServerCfg(); return `${location.protocol==='https:'?'https':'http'}://${host}:${port}`; }

// ── Server panel ───────────────────────────────────────────────────────────
function toggleServerPanel() {
  const panel=document.getElementById('server-panel'),btn=document.getElementById('server-btn');
  const open=panel.classList.toggle('open'); btn.classList.toggle('open',open);
  if(open){const{host,port}=loadServerCfg();document.getElementById('sp-host').value=host;document.getElementById('sp-port').value=port;document.getElementById('sp-host').focus();}
}
function closeServerPanel(){document.getElementById('server-panel').classList.remove('open');document.getElementById('server-btn').classList.remove('open');}
function applyServer(){const host=document.getElementById('sp-host').value.trim(),port=document.getElementById('sp-port').value.trim();if(!host||!port)return;saveServerCfg(host,port);closeServerPanel();reconnect();}
document.addEventListener('click',e=>{const panel=document.getElementById('server-panel'),btn=document.getElementById('server-btn');if(panel.classList.contains('open')&&!panel.contains(e.target)&&e.target!==btn)closeServerPanel();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeServerPanel();if(e.key==='Enter'&&document.getElementById('server-panel').classList.contains('open'))applyServer();});

// ── State ──────────────────────────────────────────────────────────────────
let ws=null,intentionalClose=false,connected=false;
let systems=[],filterMap={};
let displayCalls=[],seenIds=new Set();
let historyTotal=0,historyLoaded=0;
const HISTORY_LIMIT=100;
let filterDebounce=null;
let currentCall=null,volume=1,liveMode=true;
const PAGE_SIZE=50;
let currentPage=0;
let autoPlay=localStorage.getItem('autoplay_enabled')!=='false';
let analogEnabled=localStorage.getItem('analog_enabled')!=='false';
let audioCtx=null,activeSource=null,activeGain=null,activeBuffer=null;
let progressRaf=null,activeStart=0,activeDuration=0;
let isPaused=false,pausedAt=0;

// ── TG filter persistence ──────────────────────────────────────────────────
function saveTgFilters(){localStorage.setItem('squelch_tg_filters',JSON.stringify(filterMap));}
function loadTgFilters(){try{return JSON.parse(localStorage.getItem('squelch_tg_filters')||'null');}catch(_){return null;}}

// ── WebSocket ──────────────────────────────────────────────────────────────
function reconnect(){intentionalClose=true;if(ws){try{ws.close();}catch(_){}ws=null;}intentionalClose=false;setConnected(false);connect();}
function connect(){
  document.getElementById('server-url-display').textContent=getWsUrl().replace('/ws','');
  ws=new WebSocket(getWsUrl());
  ws.addEventListener('open',()=>{setConnected(true);sendSubscribe();loadHistory(true);});
  ws.addEventListener('close',()=>{setConnected(false);if(!intentionalClose)setTimeout(connect,2000);});
  ws.addEventListener('error',()=>{});
  ws.addEventListener('message',ev=>{try{const msg=JSON.parse(ev.data);if(msg.type==='config')onConfig(msg);else if(msg.type==='call')onLiveCall(msg.call);else if(msg.type==='calls')onCalls(msg);}catch(_){}});
}
function send(obj){if(ws&&ws.readyState===WebSocket.OPEN)ws.send(JSON.stringify(obj));}
function sendSubscribe(){const hasFilter=Object.values(filterMap).some(tgs=>Object.values(tgs).some(v=>!v));send(hasFilter?{type:'subscribe',filter:{systems:filterMap}}:{type:'subscribe'});}
function buildSearchOpts(offset){
  const opts={type:'search',limit:HISTORY_LIMIT,offset};
  const unit=parseInt(document.getElementById('f-unit').value);
  const after=document.getElementById('f-after').value,bef=document.getElementById('f-before').value;
  if(!isNaN(unit))opts.unitId=unit;
  if(after)opts.after=new Date(after).getTime();
  if(bef)opts.before=new Date(bef+'T23:59:59').getTime();
  return opts;
}
function loadHistory(reset=false){if(reset){historyLoaded=0;historyTotal=0;}send(buildSearchOpts(historyLoaded));}
function loadMore(){loadHistory(false);}

// ── Filter ─────────────────────────────────────────────────────────────────
function onFilterInput(){
  clearTimeout(filterDebounce);
  filterDebounce=setTimeout(()=>{
    const live=displayCalls.filter(c=>c._live);
    seenIds.clear();live.forEach(c=>seenIds.add(c.id));
    displayCalls=live;currentPage=0;loadHistory(true);updateFilterHighlights();
  },350);
}
function updateFilterHighlights(){['f-unit','f-after','f-before'].forEach(id=>document.getElementById(id).classList.toggle('active',!!document.getElementById(id).value));}
function clearFilters(){['f-unit','f-after','f-before'].forEach(id=>document.getElementById(id).value='');updateFilterHighlights();onFilterInput();}

// ── Event handlers ─────────────────────────────────────────────────────────
function onConfig(msg){systems=msg.systems||[];buildFilterMap();renderSidebar();}
function onLiveCall(call){
  const sysMap=filterMap[String(call.systemId)];
  if(sysMap&&sysMap[String(call.talkgroupId)]===false)return;
  const unitF=parseInt(document.getElementById('f-unit').value);
  if(!isNaN(unitF)&&!(call.units||[]).some(u=>u.unitId===unitF))return;
  const av=document.getElementById('f-after').value,bv=document.getElementById('f-before').value;
  if(av&&call.startTime<new Date(av).getTime())return;
  if(bv&&call.startTime>new Date(bv+'T23:59:59').getTime())return;
  call._live=true;
  if(seenIds.has(call.id))displayCalls=displayCalls.filter(c=>c.id!==call.id);
  seenIds.add(call.id);displayCalls.unshift(call);
  if(displayCalls.length>400){const r=displayCalls.pop();seenIds.delete(r.id);}
  renderCallList();renderPagination();updateQueueDisplay();
  if(autoPlay&&liveMode&&!currentCall&&!isPaused)playCall(call);
  send({type:'getConfig'});
}
function onCalls(msg){
  historyTotal=msg.total||0;
  const inc=(msg.calls||[]).filter(c=>!seenIds.has(c.id));
  inc.forEach(c=>seenIds.add(c.id));historyLoaded+=inc.length;
  displayCalls=[...displayCalls,...inc];
  renderCallList();renderPagination();updateQueueDisplay();
  if(autoPlay&&liveMode&&!currentCall&&!isPaused&&displayCalls.length>0)playFromOldest();
}
function playFromOldest(){if(!autoPlay||!liveMode||currentCall||isPaused)return;const fc=getFilteredCalls();if(fc.length>0)playCall(fc[fc.length-1]);}
function onCallEnded(call){
  if(!autoPlay||!liveMode)return;
  const fc=getFilteredCalls();
  const idx=fc.findIndex(c=>c.id===call.id);
  if(idx>0){playCall(fc[idx-1]);return;}
  if(idx===0)return; // already at the most recent filtered call
  // call was filtered out mid-play: walk toward more-recent calls and pick the first visible one
  const dcIdx=displayCalls.findIndex(c=>c.id===call.id);
  if(dcIdx<=0)return;
  const visibleIds=new Set(fc.map(c=>c.id));
  for(let i=dcIdx-1;i>=0;i--){
    if(visibleIds.has(displayCalls[i].id)){playCall(displayCalls[i]);return;}
  }
}

// ── Skip prev / next ───────────────────────────────────────────────────────
function skipNext(){
  const fc=getFilteredCalls();if(!fc.length)return;
  if(!currentCall){playCall(fc[0]);return;}
  const idx=fc.findIndex(c=>c.id===currentCall.id);
  if(idx>0){playCall(fc[idx-1]);return;}
  if(idx<0){
    const dcIdx=displayCalls.findIndex(c=>c.id===currentCall.id);
    const vis=new Set(fc.map(c=>c.id));
    for(let i=dcIdx-1;i>=0;i--)if(vis.has(displayCalls[i].id)){playCall(displayCalls[i]);return;}
  }
}
function skipPrev(){
  const fc=getFilteredCalls();if(!fc.length)return;
  if(!currentCall){playCall(fc[fc.length-1]);return;}
  const idx=fc.findIndex(c=>c.id===currentCall.id);
  if(idx>=0&&idx<fc.length-1){playCall(fc[idx+1]);return;}
  if(idx<0){
    const dcIdx=displayCalls.findIndex(c=>c.id===currentCall.id);
    const vis=new Set(fc.map(c=>c.id));
    for(let i=dcIdx+1;i<displayCalls.length;i++)if(vis.has(displayCalls[i].id)){playCall(displayCalls[i]);return;}
  }
}

function ledField(text,maxLen,dim=false){

  return s.split('').map(c=>{const isDim=dim||c===' ';const content=c===' '?'&nbsp;':c;return `<span class="lc${isDim?' dim':''}">${content}</span>`;}).join('');

// ── MDC / Analog ───────────────────────────────────────────────────────────
const MDC_PROBE=[1150,1200,1250,1750,1800,1850];
const CTCSS=[67,69.3,71.9,74.4,77,79.7,82.5,85.4,88.5,91.5,94.8,97.4,100,103.5,107.2,110.9,114.8,118.8,123,127.3,131.8,136.5,141.3,146.2,151.4,156.7,159.8,162.2,165.5,167.9,171.3,173.8,177.3,179.9,183.5,186.2,189.9,192.8,196.6,199.5,203.5,206.5,210.7,218.1,225.7,229.1,233.6,241.8,250.3,254.1];
const MDC_OPTS={sensitivity:1.1,chirpChunks:2,muteExtension:12,attenuationDb:50,plSensitivity:0.4,plMuteExtension:10};
function goertzel(s,f,sr){const c=2*Math.cos(2*Math.PI*f/sr);let s1=0,s2=0;for(let i=0;i<s.length;i++){const s0=s[i]+c*s1-s2;s2=s1;s1=s0;}return s1*s1+s2*s2-c*s1*s2;}
function detectTone(ch,sr,freqs,sens){const N=ch.length;if(!N)return false;let sq=0;for(let i=0;i<N;i++)sq+=ch[i]*ch[i];const rms=Math.sqrt(sq/N);if(rms<50)return false;let mx=0;for(const f of freqs){const a=2*Math.sqrt(Math.max(0,goertzel(ch,f,sr)))/N;if(a>mx)mx=a;}return(mx/rms)>sens;}
function processSamples(mono,sr,o){
  const{sensitivity:sens,chirpChunks,muteExtension,attenuationDb,plSensitivity,plMuteExtension}=o;
  const csz=Math.round(sr*.02),attn=Math.pow(10,-attenuationDb/20);
  const out=new Float32Array(mono.length);let mute=0,burst=0,pos=0;
  while(pos<mono.length){const end=Math.min(pos+csz,mono.length),ch=mono.subarray(pos,end);const isMdc=detectTone(ch,sr,MDC_PROBE,sens),isCt=!isMdc&&detectTone(ch,sr,CTCSS,plSensitivity);if(isMdc){if(mute===0){burst=1;mute=muteExtension;out.set(ch,pos);}else{burst++;mute=muteExtension;if(burst<=chirpChunks)out.set(ch,pos);else for(let i=0;i<ch.length;i++)out[pos+i]=ch[i]*attn;}}else if(isCt){mute=Math.max(mute,plMuteExtension);burst=0;for(let i=0;i<ch.length;i++)out[pos+i]=ch[i]*attn;}else if(mute>0){for(let i=0;i<ch.length;i++)out[pos+i]=ch[i]*attn;if(--mute===0)burst=0;}else{out.set(ch,pos);burst=0;}pos=end;}
  return out;
}

function updatePlayPauseBtn(){
  const btn=document.getElementById('sc-playpause');

  else{btn.disabled=false;btn.textContent=isPaused?'▶':'⏸';}

function togglePlayPause(){
  if(!currentCall&&!isPaused)return;
  const el=document.getElementById('audio-el'),sc=document.getElementById('col-scanner');
  if(isPaused){
    isPaused=false;sc.classList.remove('paused');sc.classList.add('playing');
    document.getElementById('sc-standby').style.display='none';
    if(activeBuffer){
      const src=audioCtx.createBufferSource();src.buffer=activeBuffer;
      const gain=audioCtx.createGain();gain.gain.value=volume;
      src.connect(gain);gain.connect(audioCtx.destination);
      activeSource=src;activeGain=gain;activeStart=audioCtx.currentTime-pausedAt;
      src.onended=()=>{if(activeSource===src){activeSource=null;activeGain=null;}if(currentCall){const c=currentCall;currentCall=null;isPaused=false;activeBuffer=null;sc.classList.remove('playing');clearScannerDisplay();updatePlayPauseBtn();onCallEnded(c);}cancelAnimationFrame(progressRaf);};
      src.start(0,pausedAt);_trackProgress();
    }else{el.play().catch(()=>{});}
  }else{
    isPaused=true;sc.classList.remove('playing');sc.classList.add('paused');
    if(activeSource){pausedAt=audioCtx.currentTime-activeStart;cancelAnimationFrame(progressRaf);try{activeSource.stop();}catch(_){}activeSource=null;activeGain=null;}
    else{pausedAt=el.currentTime;el.pause();}
  }

}
function clearScannerDisplay(){

function stopPlayback(){
  cancelAnimationFrame(progressRaf);progressRaf=null;
  if(activeSource){try{activeSource.stop();}catch(_){}activeSource=null;activeGain=null;}
  const el=document.getElementById('audio-el');el.pause();el.src='';el.onended=null;el.ontimeupdate=null;
  currentCall=null;isPaused=false;pausedAt=0;activeBuffer=null;

function playCall(call){
  if(!call.audioUrl)return;
  stopPlayback();currentCall=call;isPaused=false;
  const url=call.audioUrl.startsWith('http')?call.audioUrl:`${getHttpBase()}${call.audioUrl}`;
  updateScannerDisplay(call);

  if(analogEnabled&&isAnalog)_playMdc(call,url);else _playFallback(call,url);

function _playFallback(call,url){
  const el=document.getElementById('audio-el'),sc=document.getElementById('col-scanner');
  activeBuffer=null;pausedAt=0;el.src=url;el.volume=volume;el.play().catch(()=>{});
  updatePlayPauseBtn();
  el.ontimeupdate=()=>{if(!el.duration)return;const t=el.currentTime;document.getElementById('sc-prog-bar').style.width=(t/el.duration*100)+'%';document.getElementById('sc-time').textContent=`${t.toFixed(1)}  /  ${el.duration.toFixed(1)}s`;_updateActiveUnit(t);};
  el.onended=()=>{if(currentCall===call){const c=currentCall;currentCall=null;sc.classList.remove('playing');clearScannerDisplay();onCallEnded(c);}};
}
function _playMdc(call,url){
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended')audioCtx.resume();
  const sc=document.getElementById('col-scanner');
  fetch(url).then(r=>r.arrayBuffer()).then(ab=>audioCtx.decodeAudioData(ab)).then(buf=>{
    if(currentCall!==call)return;
    const len=buf.length,sr=buf.sampleRate,nCh=buf.numberOfChannels;
    const mono=new Float32Array(len);for(let c=0;c<nCh;c++){const ch=buf.getChannelData(c);for(let i=0;i<len;i++)mono[i]+=ch[i];}
    const scale=32767/nCh;for(let i=0;i<len;i++)mono[i]*=scale;
    const proc=processSamples(mono,sr,MDC_OPTS);
    const out=audioCtx.createBuffer(1,len,sr),od=out.getChannelData(0);for(let i=0;i<len;i++)od[i]=proc[i]/32767;
    if(currentCall!==call)return;
    activeBuffer=out;activeDuration=out.duration;
    const src=audioCtx.createBufferSource();src.buffer=out;
    const gain=audioCtx.createGain();gain.gain.value=volume;
    src.connect(gain);gain.connect(audioCtx.destination);
    activeSource=src;activeGain=gain;activeStart=audioCtx.currentTime;pausedAt=0;
    src.onended=()=>{if(activeSource===src){activeSource=null;activeGain=null;}if(currentCall===call){const c=currentCall;currentCall=null;isPaused=false;activeBuffer=null;sc.classList.remove('playing');clearScannerDisplay();updatePlayPauseBtn();onCallEnded(c);}cancelAnimationFrame(progressRaf);};
    src.start();_trackProgress();updatePlayPauseBtn();
  }).catch(()=>{if(currentCall===call)_playFallback(call,url);});
}
function _trackProgress(){
  cancelAnimationFrame(progressRaf);
  function tick(){if(!activeSource||!activeDuration)return;const el=audioCtx.currentTime-activeStart;const pct=Math.min(100,el/activeDuration*100);document.getElementById('sc-prog-bar').style.width=pct+'%';document.getElementById('sc-time').textContent=`${el.toFixed(1)}  /  ${activeDuration.toFixed(1)}s`;_updateActiveUnit(el);if(pct<100)progressRaf=requestAnimationFrame(tick);}
  progressRaf=requestAnimationFrame(tick);
}
function seekTo(pct){
  pct=Math.max(0,Math.min(1,pct));
  const el=document.getElementById('audio-el');
  if(activeBuffer&&activeDuration){
    const newPos=pct*activeDuration;
    cancelAnimationFrame(progressRaf);
    if(activeSource){try{activeSource.stop();}catch(_){}activeSource=null;activeGain=null;}
    pausedAt=newPos;
    if(!isPaused){
      const sc=document.getElementById('col-scanner');
      const src=audioCtx.createBufferSource();src.buffer=activeBuffer;
      const gain=audioCtx.createGain();gain.gain.value=volume;
      src.connect(gain);gain.connect(audioCtx.destination);
      activeSource=src;activeGain=gain;activeStart=audioCtx.currentTime-pausedAt;
      src.onended=()=>{if(activeSource===src){activeSource=null;activeGain=null;}if(currentCall){const c=currentCall;currentCall=null;isPaused=false;activeBuffer=null;sc.classList.remove('playing');clearScannerDisplay();updatePlayPauseBtn();onCallEnded(c);}cancelAnimationFrame(progressRaf);};
      src.start(0,pausedAt);_trackProgress();
    }
  } else if(el.src&&el.duration){
    el.currentTime=pct*el.duration;
  }
}
function _updateActiveUnit(elapsed){
  if(!currentCall)return;const units=currentCall.units||[];let best=null;
  for(const u of units)if(u.unitId>=0&&u.pos!=null&&u.pos<=elapsed&&(!best||u.pos>best.pos))best=u;
  const aid=best?String(best.unitId):null;
  const el=document.getElementById('sc-active');
  if(best){el.textContent=best.tag?`${best.unitId}  ${best.tag}`:String(best.unitId);el.classList.add('on-air');}
  else{el.textContent='';el.classList.remove('on-air');}
  document.querySelectorAll('.unit-tick').forEach(t=>t.classList.toggle('active',t.dataset.unitId===aid&&parseFloat(t.dataset.pos)<=elapsed));
  document.querySelectorAll('.bd-chip').forEach(c=>c.classList.toggle('active',c.dataset.unitId===aid));
}

// ── Call list ──────────────────────────────────────────────────────────────
function isCallVisible(call){const sm=filterMap[String(call.systemId)];return!sm||sm[String(call.talkgroupId)]!==false;}
function getFilteredCalls(){return displayCalls.filter(isCallVisible);}
function getPagedCalls(){const filtered=getFilteredCalls();const start=currentPage*PAGE_SIZE;return filtered.slice(start,start+PAGE_SIZE);}
function fmtDate(dt){return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function fmtTime(dt){if(!dt)return'';return dt.toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});}
function renderCallList(){
  const list=document.getElementById('call-list');
  if(!displayCalls.length){list.innerHTML='<div class="empty-state"><div class="icon">📡</div><p>No transmissions</p></div>';return;}
  const pageCalls=getPagedCalls();
  if(!pageCalls.length){list.innerHTML='<div class="empty-state"><div class="icon">📄</div><p>No calls match current filters</p></div>';return;}
  list.innerHTML='';
  for(const call of pageCalls){
    const row=document.createElement('div');
    row.className='dep-row'+(call.emergency?' emergency':'');
    row.dataset.id=call.id;
    if(currentCall&&currentCall.id===call.id)row.classList.add('active');
    const dt=new Date(call.startTime);
    const dur=call.callLengthMs?(call.callLengthMs/1000).toFixed(1)+'s':'';
    const isDigital=call.audioType&&call.audioType.toLowerCase().includes('digital');
    const typeStr=call.audioType?(call.audioType.toLowerCase().includes('digital')?'Digital':'Analog'):'';
    const freqStr=call.freq?(call.freq/1e6).toFixed(3):'';
    const t=ce('div','dc-time');t.textContent=fmtTime(dt);
    const id=ce('div','dc-id');id.textContent=call.talkgroupId!=null?call.talkgroupId:'';
    const ch=ce('div','dc-channel');ch.textContent=call.tgLabel||'';
    const fq=ce('div','dc-freq');fq.textContent=freqStr;
    const sys=ce('div','dc-sys');sys.textContent=call.systemLabel||`Sys ${call.systemId}`;
    const d=ce('div','dc-dur');d.textContent=dur;
    const ty=ce('div','dc-type '+(isDigital?'type-dig':'type-ana'));ty.textContent=typeStr;
    row.appendChild(t);row.appendChild(id);row.appendChild(ch);row.appendChild(fq);row.appendChild(sys);row.appendChild(d);row.appendChild(ty);
    // Detail: date, group, patches, emergency
    const detParts=[];
    detParts.push({text:fmtDate(dt),cls:'dd-date'});
    if(call.tgGroup)detParts.push({text:call.tgGroup+(call.tgGroupTag?` [${call.tgGroupTag}]`:''),cls:'dd-group'});
    if((call.patchedTgs||[]).length)detParts.push({text:'+ patch '+call.patchedTgs.join(', '),cls:'dd-patch'});
    if(call.emergency)detParts.push({text:'EMERGENCY',cls:'dd-emerg'});
    if(detParts.length){const det=ce('div','dep-detail');for(const p of detParts){const s=ce('span',p.cls);s.textContent=p.text;det.appendChild(s);}row.appendChild(det);}
    row.addEventListener('click',()=>playCall(call));
    list.appendChild(row);
  }
}
function ce(tag,cls){const e=document.createElement(tag);if(cls)e.className=cls;return e;}
function renderPagination(){
  const filtered=getFilteredCalls();
  const totalPages=Math.max(1,Math.ceil(filtered.length/PAGE_SIZE));
  if(currentPage>=totalPages)currentPage=totalPages-1;
  document.getElementById('pg-prev').disabled=currentPage===0;
  document.getElementById('pg-next').disabled=currentPage>=totalPages-1;
  const hist=displayCalls.filter(c=>!c._live).length,moreOnServer=hist<historyTotal;
  const start=filtered.length?currentPage*PAGE_SIZE+1:0,end=Math.min((currentPage+1)*PAGE_SIZE,filtered.length);
  document.getElementById('pg-info').textContent=filtered.length?`${start}–${end} of ${filtered.length}${moreOnServer?'+':''}` :'0 calls';
  const lmb=document.getElementById('load-more-btn');lmb.classList.toggle('visible',moreOnServer&&currentPage===totalPages-1);
}
function prevPage(){if(currentPage>0){currentPage--;renderCallList();renderPagination();}}
function nextPage(){const tp=Math.ceil(getFilteredCalls().length/PAGE_SIZE);if(currentPage<tp-1){currentPage++;renderCallList();renderPagination();}}

// ── Status ─────────────────────────────────────────────────────────────────
function setConnected(on){connected=on;const badge=document.getElementById('live-badge');badge.classList.toggle('connected',on&&liveMode);badge.classList.toggle('standby',on&&!liveMode);document.getElementById('server-url-display').textContent=getWsUrl().replace('/ws','');}
function toggleLiveMode(){liveMode=!liveMode;document.getElementById('live-label').textContent=liveMode?'LIVE':'STANDBY';const badge=document.getElementById('live-badge');badge.classList.toggle('connected',connected&&liveMode);badge.classList.toggle('standby',connected&&!liveMode);updateQueueDisplay();updateGlobalPlayBtn();}
document.getElementById('volume').addEventListener('input',e=>{volume=parseFloat(e.target.value);document.getElementById('audio-el').volume=volume;if(activeGain)activeGain.gain.value=volume;});
document.getElementById('sc-prog').addEventListener('click',e=>{if(!currentCall&&!isPaused)return;const r=e.currentTarget.getBoundingClientRect();seekTo((e.clientX-r.left)/r.width);});

// ── Init ───────────────────────────────────────────────────────────────────
(function init(){
  const savedTheme=localStorage.getItem('squelch_theme')||'goldenrod';
  applyTheme(savedTheme);
  document.getElementById('theme-select').value=savedTheme;
  document.getElementById('plugin-analog').classList.toggle('on',analogEnabled);
  document.getElementById('plugin-autoplay').classList.toggle('on',autoPlay);
  clearScannerDisplay();updatePlayPauseBtn();renderPagination();updateQueueDisplay();
  connect();
})();
</script>
